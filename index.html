    <antd.Modal open={open} onCancel={onClose} title="Switch Profile" footer={null} width={400}>
      <div style={{ display: 'grid', gap: 12 }}>
        {['supplier', 'officer', 'team-lead', 'recommender', 'verifier', 'approver'].map(role => (
          <Button key={role} block onClick={() => onSwitch(role)} type={currentRole === role ? 'primary' : 'default'}>
            {role.charAt(0).toUpperCase() + role.slice(1).replace('-', ' ')}
          </Button>
        ))}
      </div>
    </antd.Modal>
  );

  if (!loggedIn) {
    return (
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100vh', background: 'var(--color-bg)' }}>
        <div style={{ textAlign: 'center' }}>
          <div style={{ fontSize: 32, fontWeight: 700, marginBottom: 24, color: 'var(--color-primary)' }}>NCEF Portal</div>
          <Button type="primary" size="large" onClick={() => { setLoggedIn(true); sessionStorage.setItem('ncef.loggedIn', '1'); }}>
            Sign In
          </Button>
        </div>
      </div>
    );
  }

  return (
    <ConfigProvider theme={{ token: { colorPrimary: 'var(--color-primary)' } }}>
      <Layout style={{ minHeight: '100vh' }}>
        <Sider collapsed={sidebarCollapsed} onCollapse={setSidebarCollapsed} width={240} style={{ background: 'var(--color-bg-secondary)' }}>
          <div style={{ padding: '16px 12px', textAlign: 'center', borderBottom: '1px solid var(--color-divider)', marginBottom: 16 }}>
            <div style={{ fontSize: 14, fontWeight: 700, color: 'var(--color-primary)' }}>NCEF</div>
          </div>
          <Menu selectedKeys={[screen]} onSelect={e => { setScreen(e.key); localStorage.setItem('ncef.screen', e.key); }} items={currentNav} style={{ background: 'transparent', border: 'none' }} />
        </Sider>

        <Layout>
          <Header style={{ background: 'var(--color-bg-secondary)', borderBottom: '1px solid var(--color-divider)', display: 'flex', justifyContent: 'space-between', alignItems: 'center', paddingInline: 24 }}>
            <Button type="text" icon={<MenuOutlined />} onClick={() => setSidebarCollapsed(!sidebarCollapsed)} />
            <Space>
              <Button type="text" icon={<QuestionCircleOutlined />} />
              <Button type="text" icon={<BellOutlined />} />
              <Dropdown menu={{ items: [
                { key: 'profile', label: 'Profile', icon: <UserOutlined /> },
                { key: 'switch', label: 'Switch Profile', icon: <SwapOutlined />, onClick: () => setSwitchOpen(true) },
                { key: 'settings', label: 'Settings', icon: <SettingOutlined /> },
                { key: 'edit-mode', label: editMode ? 'Exit Edit Mode' : 'Edit Mode', icon: <FormOutlined />, onClick: () => setEditMode(!editMode) },
                { type: 'divider' },
                { key: 'logout', label: 'Sign Out', icon: <LogoutOutlined />, onClick: () => { setLoggedIn(false); sessionStorage.removeItem('ncef.loggedIn'); } },
              ] }}>
                <Avatar style={{ background: 'var(--color-primary)', cursor: 'pointer' }}>{currentUser.avatar}</Avatar>
              </Dropdown>
            </Space>
          </Header>

          <Content style={{ background: 'var(--color-bg)', padding: 24, overflowY: 'auto' }}>
            <Screen nav={setScreen} tweaks={tweaks} currentUser={currentUser} />
          </Content>
        </Layout>

        {isSupplier && (
          <div className="mina-fab" onClick={() => setMinaOpen(true)}>
            <span className="pulse" />
            <RobotOutlined style={{ fontSize: 22 }} />
          </div>
        )}

        <SwitchProfileModal
          open={switchOpen}
          currentRole={tweaks.role}
          onClose={() => setSwitchOpen(false)}
          onSwitch={handleSwitchProfile}
        />

        {/* MINA assistant drawer */}
        <MinaDrawer open={minaOpen} onClose={() => setMinaOpen(false)} currentUser={currentUser} />

        {/* Session timeout warning modal */}
        <antd.Modal
          open={sessionWarning}
          closable={false}
          maskClosable={false}
          width={420}
          footer={[
            <Button key="logout" danger onClick={() => { setSessionWarning(false); setLoggedIn(false); setScreen('login'); }}>Sign out now</Button>,
            <Button key="stay" type="primary" onClick={() => resetSessionTimer()}>Stay signed in</Button>,
          ]}
          title={<Space><antd.Typography.Text type="warning"><ClockCircleOutlined /></antd.Typography.Text> Session expiring soon</Space>}
        >
          <div style={{ textAlign: 'center', padding: '16px 0' }}>
            <div style={{ fontSize: 56, fontWeight: 700, color: sessionCountdown <= 15 ? 'var(--color-danger)' : 'var(--color-warning)', fontFamily: 'var(--font-mono)', lineHeight: 1 }}>{sessionCountdown}</div>
            <div style={{ fontSize: 13, color: 'var(--color-text-secondary)', marginTop: 10 }}>seconds until automatic sign-out</div>
            <div style={{ fontSize: 12, color: 'var(--color-text-muted)', marginTop: 6 }}>Your session has been idle for 30 minutes. Click <b>Stay signed in</b> to continue, or <b>Sign out now</b> to end your session securely.</div>
          </div>
        </antd.Modal>

        {/* Tweaks panel */}
        {editMode && (
          <div style={{ position: 'fixed', bottom: 24, left: 24, width: 320, background: '#fff', border: '1px solid var(--color-border)', borderRadius: 12, boxShadow: 'var(--elevation-3)', padding: 16, zIndex: 200 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
              <div style={{ fontSize: 14, fontWeight: 700 }}>Tweaks</div>
              <Button size="small" type="text" onClick={() => setEditMode(false)}>✕</Button>
            </div>
            <div style={{ display: 'grid', gap: 14 }}>
              <div>
                <div style={{ fontSize: 11, color: 'var(--color-text-muted)', textTransform: 'uppercase', letterSpacing: .4, fontWeight: 700, marginBottom: 6 }}>Role</div>
                <antd.Radio.Group value={tweaks.role} onChange={e => updateTweak('role', e.target.value)} buttonStyle="solid" size="small">
                  <antd.Radio.Button value="supplier">Supplier</antd.Radio.Button>
                  <antd.Radio.Button value="team-lead">Team Lead</antd.Radio.Button>
                  <antd.Radio.Button value="officer">Officer</antd.Radio.Button>
                </antd.Radio.Group>
              </div>
              <div>
                <div style={{ fontSize: 11, color: 'var(--color-text-muted)', textTransform: 'uppercase', letterSpacing: .4, fontWeight: 700, marginBottom: 6 }}>AI Score visualisation</div>
                <antd.Radio.Group value={tweaks.aiViz} onChange={e => updateTweak('aiViz', e.target.value)} size="small">
                  <antd.Radio.Button value="gauge">Gauge</antd.Radio.Button>
                  <antd.Radio.Button value="bar">Bar</antd.Radio.Button>
                  <antd.Radio.Button value="verdict">Verdict</antd.Radio.Button>
                </antd.Radio.Group>
              </div>
              <div>
                <div style={{ fontSize: 11, color: 'var(--color-text-muted)', textTransform: 'uppercase', letterSpacing: .4, fontWeight: 700, marginBottom: 6 }}>Wizard pattern</div>
                <antd.Radio.Group value={tweaks.wizardPattern} onChange={e => updateTweak('wizardPattern', e.target.value)} size="small">
                  <antd.Radio.Button value="horizontal">Horizontal</antd.Radio.Button>
                  <antd.Radio.Button value="vertical">Vertical</antd.Radio.Button>
                  <antd.Radio.Button value="pill">Pill</antd.Radio.Button>
                </antd.Radio.Group>
              </div>
              <div>
                <antd.Checkbox checked={tweaks.denseTables} onChange={e => updateTweak('denseTables', e.target.checked)}>Compact density</antd.Checkbox>
              </div>
              <div style={{ fontSize: 11, color: 'var(--color-text-muted)', paddingTop: 8, borderTop: '1px solid var(--color-divider)' }}>
                Use the sidebar to visit Dashboard, Applications, SDoC Wizard, Special Approval, Onboarding, and (as Officer) the Review Queue + Active Review.
              </div>
            </div>
          </div>
        )}
      </Layout>
    </ConfigProvider>
  );
}

// Render the app with proper error handling
let renderAttempts = 0;
const maxAttempts = 50;

function renderApp() {
  renderAttempts++;
  try {
    const root = document.getElementById('root');
    
    if (!root) {
      console.error('Root element not found');
      return;
    }
    
    if (typeof ReactDOM === 'undefined') {
      console.warn(`Attempt ${renderAttempts}: ReactDOM not ready`);
      if (renderAttempts < maxAttempts) {
        setTimeout(renderApp, 100);
      } else {
        console.error('ReactDOM failed to load');
        root.innerHTML = '<div class="error-message">Failed to load ReactDOM. Please refresh the page.</div>';
      }
      return;
    }
    
    if (typeof App === 'undefined') {
      console.warn(`Attempt ${renderAttempts}: App component not ready`);
      if (renderAttempts < maxAttempts) {
        setTimeout(renderApp, 100);
      } else {
        console.error('App component failed to load');
        root.innerHTML = '<div class="error-message">Failed to load application. Please refresh the page.</div>';
      }
      return;
    }
    
    // All dependencies ready, render the app
    ReactDOM.createRoot(root).render(React.createElement(App));
    console.log(`App rendered successfully on attempt ${renderAttempts}`);
  } catch (error) {
    console.error(`Render error on attempt ${renderAttempts}:`, error.message);
    if (renderAttempts < maxAttempts) {
      setTimeout(renderApp, 100);
    } else {
      console.error('Failed to render app after 5 seconds');
      const root = document.getElementById('root');
      if (root) {
        root.innerHTML = `<div class="error-message">Error: ${error.message}</div>`;
      }
    }
  }
}

// Start rendering when page is ready
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => {
    setTimeout(renderApp, 500);
  });
} else {
  setTimeout(renderApp, 500);
}

// Also try rendering on window load event
window.addEventListener('load', () => {
  if (renderAttempts === 0) {
    console.log('Window load event triggered, attempting render');
    renderApp();
  }
});
</script>
</body>
</html>
