function ModOfficerView({ nav, currentUser }) {
  const [selected, setSelected] = React.useState(null);
  const [decision, setDecision] = React.useState(null);
  const [note, setNote]         = React.useState('');
  const [decided, setDecided]   = React.useState({});

  const pending = MOCK.modRequestsFull.filter(r => r.status === 'pending_officer');

  function decide(req, action) {
    setDecided(prev => ({ ...prev, [req.id]: action }));
    antd.message.success(action === 'accept'
      ? `Modification ${req.id} accepted — v${(MOCK.certVersionHistory[req.rcn]?.length || 1) + 1} created for ${req.rcn}`
      : `Modification ${req.id} not accepted. Applicant notified.`);
    setSelected(null);
    setDecision(null);
    setNote('');
  }

  return (
    <div style={{ padding: 32, maxWidth: 1200, margin: '0 auto' }}>
      <div style={{ marginBottom: 20 }}>
        <div style={{ fontSize: 12, color: 'var(--color-text-muted)', textTransform: 'uppercase', letterSpacing: .4, fontWeight: 600 }}>MCMC Officer · CPPG</div>
        <antd.Typography.Title level={3} style={{ margin: '4px 0 0' }}>Modification Review Queue</antd.Typography.Title>
        <antd.Typography.Text type="secondary">Review Minor and Administrative modification requests · Accept or Not Accept</antd.Typography.Text>
      </div>
      <antd.Alert type="info" showIcon style={{ marginBottom: 20 }}
        message="Scope of officer review"
        description="Only Minor and Administrative (Others) modifications require officer review. Major modifications are automatically redirected to a new SDoC registration — no officer action needed."
      />
      <antd.Row gutter={16}>
        <antd.Col xs={24} lg={selected ? 12 : 24}>
          <antd.Card bordered title={`Pending Review (${pending.length})`}>
            {pending.length === 0
              ? <antd.Empty description="No modification requests pending review." />
              : pending.map(r => {
                  const isDecided = decided[r.id];
                  return (
                    <div key={r.id} onClick={() => !isDecided && setSelected(r)}
                      style={{ padding: 14, border: `1.5px solid ${selected?.id === r.id ? 'var(--color-primary)' : 'var(--color-border)'}`, borderRadius: 10, cursor: isDecided ? 'default' : 'pointer', marginBottom: 10, background: isDecided ? 'var(--color-bg-subtle)' : selected?.id === r.id ? 'var(--color-primary-soft)' : '#fff', opacity: isDecided ? 0.6 : 1 }}>
                      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                        <div>
                          <div style={{ display: 'flex', gap: 8, marginBottom: 6, flexWrap: 'wrap' }}>
                            <antd.Typography.Text code style={{ fontSize: 11 }}>{r.id}</antd.Typography.Text>
                            {r.categories.map(c => <antd.Tag key={c} color={c === 'Minor' ? 'orange' : 'blue'} style={{ margin: 0 }}>{c}</antd.Tag>)}
                            {isDecided && <antd.Tag color={isDecided === 'accept' ? 'green' : 'red'}>{isDecided === 'accept' ? 'Accepted this session' : 'Not accepted this session'}</antd.Tag>}
                          </div>
                          <div style={{ fontWeight: 600 }}>{r.product}</div>
                          <div style={{ fontSize: 12, color: 'var(--color-text-muted)' }}>
                            <antd.Typography.Text code style={{ fontSize: 11 }}>{r.rcn}</antd.Typography.Text> · Submitted {new Date(r.submitted).toLocaleDateString('en-GB')}
                          </div>
                        </div>
                        {!isDecided && <antd.Tag color="orange">Pending</antd.Tag>}
                      </div>
                      <div style={{ fontSize: 12, color: 'var(--color-text-secondary)', marginTop: 8, lineHeight: 1.5 }}>{r.description}</div>
                    </div>
                  );
                })
            }
          </antd.Card>
        </antd.Col>

        {selected && (
          <antd.Col xs={24} lg={12}>
            <antd.Card bordered title={`Review — ${selected.id}`} extra={<antd.Button type="text" size="small" onClick={() => { setSelected(null); setDecision(null); setNote(''); }}>✕</antd.Button>}>
              <antd.Descriptions column={1} size="small" bordered style={{ marginBottom: 16 }} items={[
                { key: 'cert',  label: 'Certificate',  children: <span><antd.Typography.Text code>{selected.rcn}</antd.Typography.Text> — {selected.product}</span> },
                { key: 'cat',   label: 'Type',         children: selected.categories.map(c => <antd.Tag key={c} color={c === 'Minor' ? 'orange' : 'blue'}>{c}</antd.Tag>) },
                { key: 'sub',   label: 'Submitted',    children: new Date(selected.submitted).toLocaleString('en-GB') },
                { key: 'ver',   label: 'Creates',      children: `v${(MOCK.certVersionHistory[selected.rcn]?.length || 1) + 1} upon acceptance` },
              ]} />
              <div style={{ fontSize: 13, lineHeight: 1.6, background: 'var(--color-bg-subtle)', padding: 12, borderRadius: 8, marginBottom: 16 }}>{selected.description}</div>
              {selected.docs?.map((d, i) => (
                <div key={i} className="doc-tile" style={{ marginBottom: 8 }}>
                  <div className="icon"><FilePdfOutlined /></div>
                  <div style={{ flex: 1 }}><div style={{ fontWeight: 600, fontSize: 12 }}>{d.name}</div><div style={{ fontSize: 11, color: 'var(--color-text-muted)' }}>{d.size}</div></div>
                  <antd.Button size="small" icon={<DownloadOutlined />} />
                </div>
              ))}
              <antd.Divider orientation="left" orientationMargin={0}>Officer Decision</antd.Divider>
              <antd.Radio.Group value={decision} onChange={e => setDecision(e.target.value)} style={{ display: 'grid', gap: 8, marginBottom: 12 }}>
                <antd.Radio value="accept" style={{ padding: 10, border: `1px solid ${decision === 'accept' ? 'var(--color-success)' : 'var(--color-border)'}`, borderRadius: 8, margin: 0, background: decision === 'accept' ? 'var(--color-success-bg)' : '#fff' }}>
                  <span style={{ fontWeight: 600, color: 'var(--color-success)' }}>Accept</span>
                  <span style={{ fontSize: 12, color: 'var(--color-text-secondary)', marginLeft: 8 }}>Creates new version of certificate with modifications applied</span>
                </antd.Radio>
                <antd.Radio value="not_accept" style={{ padding: 10, border: `1px solid ${decision === 'not_accept' ? 'var(--color-danger)' : 'var(--color-border)'}`, borderRadius: 8, margin: 0, background: decision === 'not_accept' ? 'var(--color-danger-bg)' : '#fff' }}>
                  <span style={{ fontWeight: 600, color: 'var(--color-danger)' }}>Not Accept</span>
                  <span style={{ fontSize: 12, color: 'var(--color-text-secondary)', marginLeft: 8 }}>Rejects modification; applicant notified with reason</span>
                </antd.Radio>
              </antd.Radio.Group>
              <antd.Form.Item label="Officer Note (required)" required>
                <antd.Input.TextArea rows={3} value={note} onChange={e => setNote(e.target.value)} placeholder="Provide justification for your decision…" />
              </antd.Form.Item>
              <antd.Button type="primary" disabled={!decision || !note} danger={decision === 'not_accept'}
                onClick={() => decide(selected, decision)}>
                {decision === 'accept' ? 'Accept Modification' : decision === 'not_accept' ? 'Not Accept' : 'Confirm Decision'}
              </antd.Button>
            </antd.Card>
          </antd.Col>
        )}
      </antd.Row>
    </div>
  );
}

  const [permitType, setPermitType] = React.useState('');
  const [ref, setRef]             = React.useState('');
  const [qty, setQty]             = React.useState('');
  const [imeiQty, setImeiQty]     = React.useState('');
  const [validating, setValidating] = React.useState(false);
  const [validated, setValidated]   = React.useState(false);
  const [validatedProduct, setVP]   = React.useState(null);
  const [submitting, setSubmitting] = React.useState(false);
  const [done, setDone]           = React.useState(false);
  const [newRef]                  = React.useState(`IMP-0426-${String(Date.now()).slice(-3)}`);

  const STEPS = ['Permit Type', 'Validate Reference', 'Trader & Consignor', 'Consignee & Agent', 'Logistics', 'Review & Submit'];

  function resetWizard() { setStep(0); setPermitType(''); setRef(''); setQty(''); setImeiQty(''); setValidated(false); setVP(null); setDone(false); }

  function doValidate() {
    setValidating(true);
    setTimeout(() => {
      const cert = MOCK.certificates.find(c => c.rcn.toLowerCase() === ref.toLowerCase());
      const saApp = ref.startsWith('SA-') ? { product: 'Keysight N5182B Signal Generator', scheme: 'SA' } : null;
      const found = cert || saApp;
      if (found) { setVP(found); setValidated(true); }
      else antd.message.error('Reference not found or expired. Check your RCN / SA reference number.');
      setValidating(false);
    }, 1200);
  }

  function doSubmit() {
    setSubmitting(true);
    setTimeout(() => { setSubmitting(false); setDone(true); }, 1600);
  }

  const permits = MOCK.importPermitsFull;

  // ── DONE STATE ──────────────────────────────────────────────────────────────
  if (done) return (
    <div style={{ padding: 60, textAlign: 'center', maxWidth: 640, margin: '0 auto' }}>
      <div style={{ width: 72, height: 72, borderRadius: '50%', background: 'var(--color-success-bg)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 36, margin: '0 auto 16px' }}>✓</div>
      <antd.Typography.Title level={3}>Submitted to RMCD MyOGA</antd.Typography.Title>
      <antd.Typography.Text type="secondary">Your import permit application has been transmitted via IBM webMethods ESB to RMCD. Complete payment at the RMCD MyOGA portal to receive your CoA.</antd.Typography.Text>
      <div style={{ margin: '24px 0', display: 'flex', gap: 16, justifyContent: 'center', flexWrap: 'wrap' }}>
        <div style={{ padding: 20, background: 'var(--color-primary-soft)', borderRadius: 12, textAlign: 'left', minWidth: 180 }}>
          <div style={{ fontSize: 11, color: 'var(--color-text-muted)', textTransform: 'uppercase', fontWeight: 600 }}>NCEF Reference</div>
          <div style={{ fontFamily: 'var(--font-mono)', fontWeight: 700, color: 'var(--color-primary)', fontSize: 16, marginTop: 4 }}>{newRef}</div>
        </div>
        <div style={{ padding: 20, background: 'var(--color-warning-bg)', borderRadius: 12, textAlign: 'left', minWidth: 180 }}>
          <div style={{ fontSize: 11, color: 'var(--color-text-muted)', textTransform: 'uppercase', fontWeight: 600 }}>RMCD Status</div>
          <div style={{ fontWeight: 600, color: 'var(--color-warning)', marginTop: 4 }}>Awaiting payment at RMCD</div>
        </div>
      </div>
      <antd.Alert type="info" showIcon style={{ textAlign: 'left', marginBottom: 20 }}
        message="Next: Pay at RMCD MyOGA System"
        description={<span>RMCD determines and collects all import permit fees. Once paid, a <b>Certificate of Acceptance (CoA)</b> in the format <antd.Typography.Text code>CoA-MMYY-XXXXXX</antd.Typography.Text> will be issued and reflected in your import permits list.</span>}
      />
      <antd.Space>
        <antd.Button onClick={() => { resetWizard(); setView('list'); }}>Back to Import Permits</antd.Button>
        <antd.Button type="primary" onClick={() => { resetWizard(); setView('wizard'); }}>New Application</antd.Button>
      </antd.Space>
    </div>
  );

  // ── WIZARD ──────────────────────────────────────────────────────────────────
  if (view === 'wizard') return (
    <div style={{ padding: 32, maxWidth: 960, margin: '0 auto' }}>
      <antd.Breadcrumb items={[{ title: <a onClick={() => { resetWizard(); setView('list'); }}>Import Permits</a> }, { title: 'New Application' }]} style={{ marginBottom: 12 }} />
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', marginBottom: 20 }}>
        <antd.Typography.Title level={3} style={{ margin: 0 }}>New Import Permit Application</antd.Typography.Title>
        <antd.Tag color="blue" icon={<BankOutlined_g />}>Via RMCD MyOGA System · MCMC as Issuance Agency</antd.Tag>
      </div>

      <antd.Card bordered style={{ marginBottom: 16 }}>
        <div className="wizard-pill-bar">
          {STEPS.map((s, i) => (
            <div key={s} className={`pill ${i === step ? 'active' : ''} ${i < step ? 'done' : ''}`}
              onClick={() => i < step && setStep(i)} style={{ cursor: i < step ? 'pointer' : 'default' }}>
              {i < step ? `✓ ${s}` : `${i + 1}. ${s}`}
            </div>
          ))}
        </div>
      </antd.Card>

      <antd.Card bordered>

        {/* STEP 0 — Permit Type */}
        {step === 0 && (
          <div>
            <antd.Typography.Title level={4} style={{ marginTop: 0 }}>Select Permit Type</antd.Typography.Title>
            <antd.Alert type="info" showIcon style={{ marginBottom: 20 }}
              message="Automatic assignment"
              description="Upon entering this module, you are automatically assigned MCMC as the Permit Issuance Agency with RMCD. All fees are determined and collected by RMCD — not MCMC."
            />
            <antd.Radio.Group value={permitType} onChange={e => setPermitType(e.target.value)} style={{ display: 'grid', gap: 12, width: '100%' }}>
              {[
                { v: 'Scheme A', t: 'Scheme A — Standard Certification', d: 'Full SDoC with CoC from accredited body. Validates RCN validity and IMEI/SN data.', badge: 'red' },
                { v: 'Scheme B', t: 'Scheme B — Specific Certification', d: 'SDoC with detailed technical verification. Validates RCN and quantity.', badge: 'orange' },
                { v: 'Scheme C', t: 'Scheme C — Self-Declaration', d: 'Low-risk equipment. AI-accepted or officer-reviewed. Validates RCN.', badge: 'green' },
                { v: 'SA',       t: 'Special Approval', d: 'R&D, demonstration, trial, market survey, PoC, or personal import. Validates SA reference number.', badge: 'purple' },
              ].map(opt => (
                <antd.Radio key={opt.v} value={opt.v} style={{ padding: 14, border: `1.5px solid ${permitType === opt.v ? 'var(--color-primary)' : 'var(--color-border)'}`, borderRadius: 8, margin: 0, background: permitType === opt.v ? 'var(--color-primary-soft)' : '#fff' }}>
                  <div style={{ display: 'inline-block', marginLeft: 6 }}>
                    <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                      <span style={{ fontWeight: 600 }}>{opt.t}</span>
                      <span className={`scheme-badge ${opt.v === 'SA' ? 'sa' : opt.v.replace('Scheme ', '').toLowerCase()}`}>{opt.v}</span>
                    </div>
                    <div style={{ fontSize: 12, color: 'var(--color-text-secondary)', marginTop: 2 }}>{opt.d}</div>
                  </div>
                </antd.Radio>
              ))}
            </antd.Radio.Group>
            <div style={{ marginTop: 20 }}>
              <antd.Button type="primary" disabled={!permitType} onClick={() => setStep(1)}>Continue →</antd.Button>
            </div>
          </div>
        )}

        {/* STEP 1 — Validate Reference */}
        {step === 1 && (
          <div style={{ maxWidth: 600 }}>
            <antd.Typography.Title level={4} style={{ marginTop: 0 }}>
              Validate {permitType === 'SA' ? 'Special Approval Reference' : 'Registered Compliance Number (RCN)'}
            </antd.Typography.Title>
            <antd.Typography.Text type="secondary">
              The system validates your reference against NCEF records, including certificate validity, IMEI/SN registration, and quantity compliance before forwarding to RMCD.
            </antd.Typography.Text>
            <antd.Form layout="vertical" style={{ marginTop: 20 }}>
              <antd.Form.Item label={permitType === 'SA' ? 'Special Approval Reference Number' : 'Registered Compliance Number (RCN)'} required>
                <antd.Input size="large"
                  placeholder={permitType === 'SA' ? 'SA-0426-00012' : 'RCN-0326-00449'}
                  value={ref} onChange={e => { setRef(e.target.value); setValidated(false); setVP(null); }}
                  prefix={<SafetyCertificateOutlined style={{ color: 'var(--color-text-muted)' }} />}
                  suffix={validated ? <CheckCircleOutlined style={{ color: 'var(--color-success)' }} /> : null}
                />
              </antd.Form.Item>
              <antd.Row gutter={12}>
                <antd.Col span={12}>
                  <antd.Form.Item label="Import Quantity" required extra="Total units in this shipment">
                    <antd.InputNumber size="large" style={{ width: '100%' }} min={1} value={qty || undefined} onChange={v => setQty(v)} placeholder="500" addonAfter="units" />
                  </antd.Form.Item>
                </antd.Col>
                {permitType !== 'SA' && (
                  <antd.Col span={12}>
                    <antd.Form.Item label="IMEI / Serial Numbers" extra="Must match registered identifiers">
                      <antd.InputNumber size="large" style={{ width: '100%' }} min={0} value={imeiQty || undefined} onChange={v => setImeiQty(v)} placeholder="500" addonAfter="IMEIs" />
                    </antd.Form.Item>
                  </antd.Col>
                )}
              </antd.Row>

              {validated && validatedProduct && (
                <antd.Alert type="success" showIcon style={{ marginBottom: 8 }} message="Reference validated successfully"
                  description={
                    <div>
                      <div><b>Product:</b> {validatedProduct.product || validatedProduct.model}</div>
                      {validatedProduct.scheme && <div><b>Scheme:</b> {validatedProduct.scheme} · Status: Active</div>}
                      <div style={{ marginTop: 6, color: 'var(--color-success)', fontWeight: 600, fontSize: 12 }}>✓ IMEI/SN data and quantity verified against NCEF registry</div>
                    </div>
                  }
                />
              )}
            </antd.Form>
            <div style={{ display: 'flex', gap: 10, marginTop: 8 }}>
              <antd.Button onClick={() => setStep(0)}>← Back</antd.Button>
              {!validated
                ? <antd.Button type="primary" loading={validating} disabled={!ref || !qty} onClick={doValidate}>Validate →</antd.Button>
                : <antd.Button type="primary" onClick={() => setStep(2)}>Continue →</antd.Button>}
            </div>
          </div>
        )}

        {/* STEP 2 — Trader & Consignor */}
        {step === 2 && (
          <div>
            <antd.Typography.Title level={4} style={{ marginTop: 0 }}>Trader Information & Consignor Details</antd.Typography.Title>
            <antd.Form layout="vertical">
              <antd.Card size="small" bordered style={{ marginBottom: 20 }}>
                <div style={{ fontWeight: 700, marginBottom: 12, fontSize: 13 }}>Trader Information (RMCD/JKDM Registration)</div>
                <antd.Alert type="info" showIcon style={{ marginBottom: 14 }} message="Trader details must match your RMCD/JKDM registration exactly for cross-system validation." />
                <antd.Row gutter={16}>
                  <antd.Col span={12}><antd.Form.Item label="Trader Name" required><antd.Input defaultValue="Axiata Digital Sdn Bhd" /></antd.Form.Item></antd.Col>
                  <antd.Col span={12}><antd.Form.Item label="Trader RMCD/JKDM Code" required><antd.Input placeholder="MY-2019-000345" /></antd.Form.Item></antd.Col>
                  <antd.Col span={12}><antd.Form.Item label="ROC / ROB Number" required><antd.Input defaultValue="201901023456" /></antd.Form.Item></antd.Col>
                  <antd.Col span={12}><antd.Form.Item label="SST Registration Number"><antd.Input placeholder="W10-1808-32000123" /></antd.Form.Item></antd.Col>
                  <antd.Col span={24}><antd.Form.Item label="Registered Address" required><antd.Input.TextArea rows={2} defaultValue="Level 21, Axiata Tower, No. 9 Jalan Stesen Sentral 5, KL Sentral, 50470 Kuala Lumpur" /></antd.Form.Item></antd.Col>
                </antd.Row>
              </antd.Card>

              <antd.Card size="small" bordered>
                <div style={{ fontWeight: 700, marginBottom: 12, fontSize: 13 }}>Consignor Details (Overseas Supplier)</div>
                <antd.Row gutter={16}>
                  <antd.Col span={12}><antd.Form.Item label="Company Name" required><antd.Input placeholder="Guangdong OPPO Mobile Telecommunications Corp., Ltd." /></antd.Form.Item></antd.Col>
                  <antd.Col span={12}><antd.Form.Item label="Country / Place of Origin" required>
                    <antd.Select showSearch placeholder="Select country…" options={MOCK.countries.map(c => ({ value: c, label: c }))} />
                  </antd.Form.Item></antd.Col>
                  <antd.Col span={24}><antd.Form.Item label="Full Address" required><antd.Input.TextArea rows={2} placeholder="No. 18 Haibin Road, Wuchang, Dongguan, Guangdong 523860, China" /></antd.Form.Item></antd.Col>
                  <antd.Col span={12}><antd.Form.Item label="Contact Person"><antd.Input placeholder="Mr. Li Wei" /></antd.Form.Item></antd.Col>
                  <antd.Col span={12}><antd.Form.Item label="Contact Email"><antd.Input placeholder="li.wei@oppo.com" /></antd.Form.Item></antd.Col>
                </antd.Row>
              </antd.Card>
            </antd.Form>
            <div style={{ display: 'flex', gap: 10, marginTop: 16 }}>
              <antd.Button onClick={() => setStep(1)}>← Back</antd.Button>
              <antd.Button type="primary" onClick={() => setStep(3)}>Continue →</antd.Button>
            </div>
          </div>
        )}

        {/* STEP 3 — Consignee & Agent */}
        {step === 3 && (
          <div>
            <antd.Typography.Title level={4} style={{ marginTop: 0 }}>Consignee & Customs Agent</antd.Typography.Title>
            <antd.Form layout="vertical">
              <antd.Card size="small" bordered style={{ marginBottom: 20 }}>
                <div style={{ fontWeight: 700, marginBottom: 12, fontSize: 13 }}>Consignee (Malaysian Importer)</div>
                <antd.Row gutter={16}>
                  <antd.Col span={12}><antd.Form.Item label="Company Name" required><antd.Input defaultValue="Axiata Digital Sdn Bhd" /></antd.Form.Item></antd.Col>
                  <antd.Col span={12}><antd.Form.Item label="ROC / ROB Number" required><antd.Input defaultValue="201901023456" /></antd.Form.Item></antd.Col>
                  <antd.Col span={24}><antd.Form.Item label="Full Address" required><antd.Input.TextArea rows={2} defaultValue="Level 21, Axiata Tower, No. 9 Jalan Stesen Sentral 5, KL Sentral, 50470 Kuala Lumpur" /></antd.Form.Item></antd.Col>
                  <antd.Col span={12}><antd.Form.Item label="Contact Person" required><antd.Input defaultValue="Nurul Aisyah binti Ahmad" /></antd.Form.Item></antd.Col>
                  <antd.Col span={12}><antd.Form.Item label="Contact Phone" required><antd.Input defaultValue="+60 3-2263 8888" /></antd.Form.Item></antd.Col>
                </antd.Row>
              </antd.Card>

              <antd.Card size="small" bordered>
                <div style={{ fontWeight: 700, marginBottom: 12, fontSize: 13 }}>Customs / Forwarding Agent</div>
                <antd.Row gutter={16}>
                  <antd.Col span={12}><antd.Form.Item label="Agent Name" required><antd.Input placeholder="Aman Logistics Sdn Bhd" /></antd.Form.Item></antd.Col>
                  <antd.Col span={12}><antd.Form.Item label="Agent Code (JKDM)" required><antd.Input placeholder="A-2015-00423" /></antd.Form.Item></antd.Col>
                  <antd.Col span={24}><antd.Form.Item label="Agent Address"><antd.Input.TextArea rows={2} placeholder="No. 12, Jalan Cargo, Sepang, 64000 Selangor" /></antd.Form.Item></antd.Col>
                </antd.Row>
              </antd.Card>
            </antd.Form>
            <div style={{ display: 'flex', gap: 10, marginTop: 16 }}>
              <antd.Button onClick={() => setStep(2)}>← Back</antd.Button>
              <antd.Button type="primary" onClick={() => setStep(4)}>Continue →</antd.Button>
            </div>
          </div>
        )}

        {/* STEP 4 — Logistics */}
        {step === 4 && (
          <div style={{ maxWidth: 680 }}>
            <antd.Typography.Title level={4} style={{ marginTop: 0 }}>Logistics & Shipment Details</antd.Typography.Title>
            <antd.Form layout="vertical">
              <antd.Row gutter={16}>
                <antd.Col span={12}>
                  <antd.Form.Item label="Mode of Transport" required>
                    <antd.Select defaultValue="air" options={[{ value: 'air', label: '✈ Air Freight' }, { value: 'sea', label: '🚢 Sea Freight' }, { value: 'land', label: '🚛 Land / Road' }, { value: 'express', label: '📦 Express Courier' }]} />
                  </antd.Form.Item>
                </antd.Col>
                <antd.Col span={12}>
                  <antd.Form.Item label="Purpose of Import" required>
                    <antd.Select defaultValue="commercial" options={[{ value: 'commercial', label: 'Commercial Sale' }, { value: 'personal', label: 'Personal Use' }, { value: 'rd', label: 'Research & Development' }, { value: 'demo', label: 'Demonstration / Sample' }]} />
                  </antd.Form.Item>
                </antd.Col>
                <antd.Col span={12}>
                  <antd.Form.Item label="Custom Station / Port of Entry" required>
                    <antd.Select showSearch defaultValue="KLIA Cargo Terminal" options={MOCK.customStations.map(s => ({ value: s, label: s }))} />
                  </antd.Form.Item>
                </antd.Col>
                <antd.Col span={12}>
                  <antd.Form.Item label="Expected Arrival Date">
                    <antd.DatePicker style={{ width: '100%' }} />
                  </antd.Form.Item>
                </antd.Col>
                <antd.Col span={12}>
                  <antd.Form.Item label="HS Tariff Code" extra="Harmonised System code for customs classification">
                    <antd.Input placeholder="8517.12.00" />
                  </antd.Form.Item>
                </antd.Col>
                <antd.Col span={12}>
                  <antd.Form.Item label="CIF Value (MYR)" extra="Cost, Insurance & Freight value for customs valuation">
                    <antd.InputNumber style={{ width: '100%' }} placeholder="850000" formatter={v => `RM ${v}`.replace(/\B(?=(\d{3})+(?!\d))/g, ',')} parser={v => v?.replace(/RM\s?|(,*)/g, '')} />
                  </antd.Form.Item>
                </antd.Col>
                <antd.Col span={24}>
                  <antd.Form.Item label="Remarks / Special Instructions">
                    <antd.Input.TextArea rows={3} placeholder="e.g. Temperature-controlled handling required. Lithium battery classification applies." />
                  </antd.Form.Item>
                </antd.Col>
              </antd.Row>
            </antd.Form>
            <div style={{ display: 'flex', gap: 10 }}>
              <antd.Button onClick={() => setStep(3)}>← Back</antd.Button>
              <antd.Button type="primary" onClick={() => setStep(5)}>Review →</antd.Button>
            </div>
          </div>
        )}

        {/* STEP 5 — Review & Submit */}
        {step === 5 && (
          <div style={{ maxWidth: 680 }}>
            <antd.Typography.Title level={4} style={{ marginTop: 0 }}>Review & Submit to RMCD</antd.Typography.Title>
            <antd.Descriptions bordered column={2} size="small" style={{ marginBottom: 16 }}>
              <antd.Descriptions.Item label="Permit Type" span={2}><antd.Tag>{permitType}</antd.Tag></antd.Descriptions.Item>
              <antd.Descriptions.Item label={permitType === 'SA' ? 'SA Reference' : 'RCN'}><antd.Typography.Text code>{ref}</antd.Typography.Text></antd.Descriptions.Item>
              <antd.Descriptions.Item label="Product">{validatedProduct?.product || validatedProduct?.model || '—'}</antd.Descriptions.Item>
              <antd.Descriptions.Item label="Quantity">{qty} units</antd.Descriptions.Item>
              {permitType !== 'SA' && <antd.Descriptions.Item label="IMEI / SNs">{imeiQty || 0} identifiers</antd.Descriptions.Item>}
              <antd.Descriptions.Item label="Consignor">Guangdong OPPO Mobile Telecom Corp.</antd.Descriptions.Item>
              <antd.Descriptions.Item label="Country of Origin">China</antd.Descriptions.Item>
              <antd.Descriptions.Item label="Consignee" span={2}>Axiata Digital Sdn Bhd · ROC 201901023456</antd.Descriptions.Item>
              <antd.Descriptions.Item label="Agent">Aman Logistics Sdn Bhd · A-2015-00423</antd.Descriptions.Item>
              <antd.Descriptions.Item label="Port">KLIA Cargo Terminal</antd.Descriptions.Item>
              <antd.Descriptions.Item label="Mode">Air Freight</antd.Descriptions.Item>
              <antd.Descriptions.Item label="Payment">Collected by RMCD MyOGA</antd.Descriptions.Item>
            </antd.Descriptions>
            <antd.Alert type="warning" showIcon style={{ marginBottom: 16 }}
              message="Payment at RMCD — not MCMC Pay"
              description="You will be directed to the RMCD MyOGA System to complete payment. All import permit fees are determined and collected exclusively by RMCD. No payment is made through the NCEF portal."
            />
            <antd.Alert type="info" showIcon style={{ marginBottom: 20 }}
              message="CoA upon successful payment"
              description={<span>RMCD will issue a <b>Certificate of Acceptance (CoA)</b> in the format <antd.Typography.Text code>CoA-MMYY-XXXXXX</antd.Typography.Text> once payment is confirmed. This links your NCEF-validated equipment to the physical shipment.</span>}
            />
            <div style={{ display: 'flex', gap: 10 }}>
              <antd.Button onClick={() => setStep(4)}>← Back</antd.Button>
              <antd.Button type="primary" loading={submitting} onClick={doSubmit} icon={<ArrowRightOutlined />}>Submit to RMCD MyOGA</antd.Button>
            </div>
          </div>
        )}
      </antd.Card>
    </div>
  );

  // ── LIST VIEW ──────────────────────────────────────────────────────────────
  const statusMeta = {
    pending_rmcd: { label: 'Pending RMCD Payment', color: 'orange' },
    coa_issued:   { label: 'CoA Issued',            color: 'green'  },
    rejected:     { label: 'Rejected by RMCD',      color: 'red'    },
  };

  return (
    <div style={{ padding: 32, maxWidth: 1300, margin: '0 auto' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', marginBottom: 20 }}>
        <div>
          <div style={{ fontSize: 12, color: 'var(--color-text-muted)', textTransform: 'uppercase', letterSpacing: .4, fontWeight: 600 }}>Supplier · RMCD Integration</div>
          <antd.Typography.Title level={3} style={{ margin: '4px 0 0' }}>Import Permits</antd.Typography.Title>
          <antd.Typography.Text type="secondary">Import permit applications via RMCD MyOGA · Certificate of Acceptance (CoA) tracking</antd.Typography.Text>
        </div>
        <antd.Button type="primary" icon={<PlusOutlined />} onClick={() => { resetWizard(); setView('wizard'); }}>New Import Application</antd.Button>
      </div>

      <antd.Row gutter={[16, 16]} style={{ marginBottom: 20 }}>
        {[
          { l: 'Total Applications', v: permits.length },
          { l: 'CoA Issued',         v: permits.filter(p => p.status === 'coa_issued').length,   color: 'var(--color-success)' },
          { l: 'Pending RMCD',       v: permits.filter(p => p.status === 'pending_rmcd').length, warn: true },
          { l: 'Total Units Imported',v: permits.filter(p => p.status === 'coa_issued').reduce((a, b) => a + b.quantity, 0).toLocaleString() },
        ].map((k, i) => (
          <antd.Col xs={12} md={6} key={i}>
            <div className="kpi-card"><div className="kpi-label">{k.l}</div><div className="kpi-value" style={{ color: k.warn && parseInt(k.v) > 0 ? 'var(--color-warning)' : k.color || 'inherit' }}>{k.v}</div></div>
          </antd.Col>
        ))}
      </antd.Row>

      <antd.Card bordered>
        <antd.Table rowKey="id" dataSource={permits} pagination={false}
          onRow={r => ({ onClick: () => setSelected(r), style: { cursor: 'pointer' } })}
          columns={[
            { title: 'App ID',     dataIndex: 'id',      render: v => <antd.Typography.Text code style={{ fontSize: 11 }}>{v}</antd.Typography.Text> },
            { title: 'Type',       dataIndex: 'type',    render: v => <antd.Tag>{v}</antd.Tag> },
            { title: 'Reference',  render: (_, r) => r.rcn ? <antd.Typography.Text code style={{ fontSize: 11 }}>{r.rcn}</antd.Typography.Text> : <antd.Typography.Text code style={{ fontSize: 11 }}>{r.saRef}</antd.Typography.Text> },

    </div>
  );
};

function FindingsDrawer({ open, audit, onClose }) {
  const [checklist, setChecklist] = React.useState(audit?.findings?.checklist || []);
  const [obs, setObs]             = React.useState(audit?.findings?.observations || '');
  const [ncText, setNcText]       = React.useState('');
  const [ncSev, setNcSev]         = React.useState('minor');
  const [ncList, setNcList]       = React.useState(audit?.findings?.nonConformances || []);
  const [saved, setSaved]         = React.useState(false);

  React.useEffect(() => {
    setChecklist(audit?.findings?.checklist || []);
    setObs(audit?.findings?.observations || '');
    setNcList(audit?.findings?.nonConformances || []);
    setSaved(false);
  }, [audit?.id]);

  function setResult(id, result) {
    setChecklist(prev => prev.map(c => c.id === id ? { ...c, result } : c));
    setSaved(false);
  }
  function setNote(id, note) {
    setChecklist(prev => prev.map(c => c.id === id ? { ...c, note } : c));
    setSaved(false);
  }
  function addNC() {
    if (!ncText) return;
    setNcList(prev => [...prev, { id: `NC-${Date.now()}`, item: ncText, severity: ncSev, status: 'open', correctionDeadline: '2026-05-28' }]);
    setNcText(''); setSaved(false);
  }

  const passCount = checklist.filter(c => c.result === 'pass').length;
  const failCount = checklist.filter(c => c.result === 'fail').length;
  const pendCount = checklist.filter(c => c.result === 'pending').length;

  return (
    <antd.Drawer open={open} onClose={onClose} width={600} title={audit ? `Audit Findings — ${audit.id} · ${audit.supplier}` : ''}
      footer={<div style={{ display: 'flex', justifyContent: 'flex-end', gap: 10 }}><antd.Button onClick={onClose}>Cancel</antd.Button><antd.Button type="primary" icon={<CheckOutlined />} onClick={() => { setSaved(true); antd.message.success('Findings saved. Non-conformances will feed back into the AI Risk Scoring Engine.'); }}>Save Findings</antd.Button></div>}>
      {audit && (
        <div>
          {saved && <antd.Alert type="success" showIcon style={{ marginBottom: 16 }} message="Findings saved" description="Non-conformance records have been logged and will affect this supplier's future AI risk score." />}

          {/* Summary */}
          <antd.Row gutter={[12, 12]} style={{ marginBottom: 20 }}>
            {[{ l: 'Pass', v: passCount, color: 'var(--color-success)' }, { l: 'Fail', v: failCount, color: 'var(--color-danger)', warn: failCount > 0 }, { l: 'Pending', v: pendCount, color: 'var(--color-warning)' }].map((k, i) => (
              <antd.Col span={8} key={i}><div className="kpi-card" style={{ padding: '12px 14px' }}><div className="kpi-label">{k.l}</div><div className="kpi-value" style={{ fontSize: 22, color: k.warn && k.v > 0 ? k.color : k.color }}>{k.v}</div></div></antd.Col>
            ))}
          </antd.Row>

          {/* Checklist */}
          <antd.Typography.Title level={5} style={{ marginTop: 0 }}>Compliance Checklist</antd.Typography.Title>
          {checklist.map(c => (
            <div key={c.id} style={{ padding: '10px 12px', border: `1px solid ${c.result === 'fail' ? 'var(--color-danger)' : c.result === 'pass' ? 'var(--color-success)' : 'var(--color-border)'}40`, borderRadius: 8, marginBottom: 8, background: c.result === 'fail' ? 'var(--color-danger-bg)' : c.result === 'pass' ? 'var(--color-success-bg)' : 'var(--color-bg-subtle)' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 10 }}>
                <div style={{ display: 'flex', gap: 8, alignItems: 'center', flex: 1 }}>
                  {checkResultIcon(c.result)}
                  <span style={{ fontSize: 13, fontWeight: 500 }}>{c.item}</span>
                </div>
                <antd.Radio.Group size="small" value={c.result} onChange={e => setResult(c.id, e.target.value)} buttonStyle="solid">
                  <antd.Radio.Button value="pass">Pass</antd.Radio.Button>
                  <antd.Radio.Button value="fail">Fail</antd.Radio.Button>
                  <antd.Radio.Button value="pending">N/A</antd.Radio.Button>
                </antd.Radio.Group>
              </div>
              {c.result === 'fail' && (
                <antd.Input size="small" style={{ marginTop: 8 }} placeholder="Describe the non-conformance…" value={c.note} onChange={e => setNote(c.id, e.target.value)} />
              )}
              {c.result === 'pass' && c.note && <div style={{ fontSize: 11, color: 'var(--color-text-muted)', marginTop: 4 }}>{c.note}</div>}
            </div>
          ))}

          {/* Observations */}
          <antd.Divider orientation="left" orientationMargin={0} style={{ marginTop: 20 }}>Observations & Remarks</antd.Divider>
          <antd.Input.TextArea rows={4} value={obs} onChange={e => { setObs(e.target.value); setSaved(false); }} placeholder="Overall audit observations, context, special circumstances…" style={{ marginBottom: 16 }} />

          {/* Document upload */}
          <antd.Divider orientation="left" orientationMargin={0}>Audit Evidence & Test Results</antd.Divider>
          <antd.Upload.Dragger multiple style={{ borderRadius: 8, marginBottom: 16 }}>
            <p style={{ fontSize: 24, margin: 0 }}>📎</p>
            <p style={{ fontWeight: 600 }}>Upload audit evidence</p>
            <p style={{ fontSize: 12, color: 'var(--color-text-muted)' }}>Test reports, photos, compliance checklists, inspection documents · PDF / PNG / JPEG</p>
          </antd.Upload.Dragger>

          {/* Non-conformances */}
          <antd.Divider orientation="left" orientationMargin={0}>Non-Conformance Records</antd.Divider>
          <antd.Alert type="info" showIcon style={{ marginBottom: 12 }} message="NC records automatically feed back into the AI Risk Scoring Engine, affecting this supplier's future audit priority." />
          {ncList.map((nc, i) => (
            <div key={nc.id} style={{ padding: 10, border: `1px solid ${nc.severity === 'major' ? 'var(--color-danger)' : 'var(--color-warning)'}40`, borderRadius: 8, marginBottom: 8, background: nc.severity === 'major' ? 'var(--color-danger-bg)' : 'var(--color-warning-bg)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <div>
                <antd.Tag color={nc.severity === 'major' ? 'red' : 'orange'} style={{ marginRight: 8 }}>{nc.severity}</antd.Tag>
                <span style={{ fontSize: 13, fontWeight: 500 }}>{nc.item}</span>
                <div style={{ fontSize: 11, color: 'var(--color-text-muted)', marginTop: 2 }}>Correction deadline: {nc.correctionDeadline} · Status: {nc.status}</div>
              </div>
              <antd.Tag color={nc.status === 'open' ? 'orange' : 'green'}>{nc.status}</antd.Tag>
            </div>
          ))}
          <div style={{ display: 'flex', gap: 8, marginTop: 8 }}>
            <antd.Select value={ncSev} onChange={setNcSev} style={{ width: 110 }} options={[{ value: 'minor', label: 'Minor NC' }, { value: 'major', label: 'Major NC' }]} />
            <antd.Input placeholder="Describe non-conformance…" value={ncText} onChange={e => setNcText(e.target.value)} onPressEnter={addNC} />
            <antd.Button type="primary" onClick={addNC} disabled={!ncText}>Add</antd.Button>
          </div>
        </div>
      )}
    </antd.Drawer>
  );
}

      </antd.Card>

    </div>

function StatusChangeModal({ open, entity, entityType, currentStatus, onClose, onSave }) {
  const [newStatus, setNewStatus] = React.useState('');
  const [reason, setReason]       = React.useState('');
  const [confirmed, setConfirmed] = React.useState(false);

  React.useEffect(() => { if (open) { setNewStatus(''); setReason(''); setConfirmed(false); } }, [open]);

  const isDestructive = ['suspended', 'cancelled'].includes(newStatus);

  return (
    <antd.Modal open={open} onCancel={onClose} width={520}
      title={<antd.Space><SafetyOut_j />Change Compliance Status</antd.Space>}
      okText={isDestructive ? 'Apply (Destructive Action)' : 'Apply Status Change'}
      okButtonProps={{ disabled: !newStatus || !reason || (isDestructive && !confirmed), danger: isDestructive }}
      onOk={() => { onSave(newStatus, reason); onClose(); }}>
      {entity && (
        <antd.Form layout="vertical">
          <antd.Alert type="warning" showIcon style={{ marginBottom: 16 }}
            message={`Changing compliance status for: ${entity} (${entityType})`}
            description={<span>Current status: <StatusTag status={currentStatus} /></span>}
          />

          <antd.Form.Item label="New Compliance Status" required>
            <div style={{ display: 'grid', gap: 8 }}>
              {Object.entries(STATUS_META).filter(([k]) => k !== currentStatus).map(([key, meta]) => (
                <div key={key} onClick={() => setNewStatus(key)}
                  style={{ padding: 12, border: `1.5px solid ${newStatus === key ? meta.border : 'var(--color-border)'}`, borderRadius: 8, cursor: 'pointer', background: newStatus === key ? meta.bg : '#fff' }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                    <div>
                      <antd.Tag color={meta.color} style={{ margin: 0 }}>{meta.label}</antd.Tag>
                    </div>
                    {newStatus === key && <CheckCircleOutlined style={{ color: meta.dot, fontSize: 16 }} />}
                  </div>
                  {newStatus === key && PROPAGATION[key] && (
                    <div style={{ marginTop: 8 }}>
                      <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--color-text-muted)', textTransform: 'uppercase', marginBottom: 4 }}>System Effects:</div>
                      {PROPAGATION[key].map((p, i) => (
                        <div key={i} style={{ fontSize: 11, color: isDestructive ? 'var(--color-danger)' : 'var(--color-text-secondary)', display: 'flex', gap: 4 }}>
                          <span>{isDestructive ? '⚠' : '→'}</span><span>{p}</span>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              ))}
            </div>
          </antd.Form.Item>

          <antd.Form.Item label="Reason (mandatory — recorded in immutable audit trail)" required>
            <antd.Input.TextArea rows={3} value={reason} onChange={e => setReason(e.target.value)} placeholder="Provide a detailed justification. This will be included in the immutable compliance history and any notifications sent to the entity." />
          </antd.Form.Item>

          {isDestructive && (
            <antd.Checkbox checked={confirmed} onChange={e => setConfirmed(e.target.checked)} style={{ color: 'var(--color-danger)', fontWeight: 600 }}>
              I confirm this action will immediately propagate system-wide and cannot be undone without a further status change.
            </antd.Checkbox>
          )}
        </antd.Form>
      )}
    </antd.Modal>
  );
}

          ]} />
        )}

        <antd.Divider orientation="left" orientationMargin={0}>Compliance Status History</antd.Divider>
        {history.length === 0
          ? <antd.Typography.Text type="secondary">No status changes recorded — entity has been Active since creation.</antd.Typography.Text>
          : <antd.Timeline items={history.map((h, i) => ({
              color: h.status === 'active' ? 'green' : h.status === 'suspended' ? 'red' : h.status === 'cancelled' ? 'gray' : 'orange',

                <div style={{ fontSize: 12 }}>

                  <div style={{ color: 'var(--color-text-secondary)', lineHeight: 1.5 }}>{h.reason}</div>
                </div>
              ),
            }))} />
        }
      </div>
    </antd.Drawer>
  );
}

SCREENS['notifications'] = function NotificationsCentre({ nav }) {
  const [notifs, setNotifs] = React.useState(window.MOCK.notifications);
  const [tab, setTab] = React.useState('all');

  const catIcon  = { iteration: <WarningOutlined />, payment: <CheckCircleOutlined />, approved: <SafetyCertificateOutlined />, expiry: <ClockCircleOutlined />, rejected: <CloseCircleOutlined />, system: <InfoCircleOutlined /> };
  const catColor = { iteration: 'var(--color-warning)', payment: 'var(--color-success)', approved: 'var(--color-success)', expiry: 'var(--color-warning)', rejected: 'var(--color-danger)', system: 'var(--color-info)' };
  const catLabel = { iteration: 'Action Required', payment: 'Payment', approved: 'Certificate', expiry: 'Expiry Alert', rejected: 'Rejected', system: 'System' };

  const markRead = (id) => setNotifs(n => n.map(x => x.id === id ? { ...x, read: true } : x));
  const markAllRead = () => setNotifs(n => n.map(x => ({ ...x, read: true })));

  const tabs = [
    { key: 'all',         label: `All (${notifs.length})` },
    { key: 'unread',      label: `Unread (${notifs.filter(n => !n.read).length})` },
    { key: 'iteration',   label: 'Action Required' },
    { key: 'system',      label: 'System' },
  ];

  const visible = notifs.filter(n => {
    if (tab === 'all') return true;
    if (tab === 'unread') return !n.read;
    return n.cat === tab;
  });

  return (
    <div style={{ padding: 32, maxWidth: 860, margin: '0 auto' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', marginBottom: 20 }}>
        <div>
          <div style={{ fontSize: 12, color: 'var(--color-text-muted)', textTransform: 'uppercase', letterSpacing: .4, fontWeight: 600 }}>Notifications</div>
          <antd.Typography.Title level={3} style={{ margin: '4px 0 0' }}>Notification Centre</antd.Typography.Title>
          <antd.Typography.Text type="secondary">Stay informed on your applications, certificates, and system events</antd.Typography.Text>
        </div>
        <antd.Button onClick={markAllRead} icon={<CheckOutlined />}>Mark all read</antd.Button>
      </div>

      <antd.Card bordered bodyStyle={{ padding: 0 }}>
        <div style={{ padding: '0 16px', borderBottom: '1px solid var(--color-divider)' }}>
          <antd.Tabs activeKey={tab} onChange={setTab} items={tabs.map(t => ({ key: t.key, label: t.label }))} />
        </div>

        {visible.length === 0 && (
          <antd.Empty description="No notifications" style={{ padding: '48px 0' }} />
        )}

        {visible.map((n, i) => (
          <div
            key={n.id}
            onClick={() => { markRead(n.id); if (n.appId) nav(n.cat === 'iteration' ? 'iteration-reply' : 'applications'); }}
            style={{
              padding: '16px 20px',
              borderBottom: i < visible.length - 1 ? '1px solid var(--color-divider)' : 'none',
              background: n.read ? '#fff' : 'rgba(11,79,145,0.03)',
              cursor: 'pointer',
              display: 'flex',
              gap: 14,
              alignItems: 'flex-start',
              transition: 'background .15s',
            }}
          >
            {/* Unread dot */}
            <div style={{ width: 8, height: 8, borderRadius: '50%', background: n.read ? 'transparent' : 'var(--color-primary)', marginTop: 6, flexShrink: 0 }} />

            {/* Category icon */}
            <div style={{ width: 36, height: 36, borderRadius: 10, background: `${catColor[n.cat]}18`, display: 'flex', alignItems: 'center', justifyContent: 'center', color: catColor[n.cat], fontSize: 16, flexShrink: 0 }}>
              {catIcon[n.cat]}
            </div>

            {/* Content */}
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 8, marginBottom: 4 }}>
                <div style={{ fontWeight: n.read ? 500 : 700, fontSize: 14, lineHeight: 1.3 }}>{n.title}</div>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexShrink: 0 }}>
                  <antd.Tag color={n.cat === 'iteration' ? 'orange' : n.cat === 'approved' ? 'green' : n.cat === 'rejected' ? 'red' : n.cat === 'expiry' ? 'gold' : 'default'} style={{ margin: 0, fontSize: 10 }}>
                    {catLabel[n.cat]}
                  </antd.Tag>
                  <span style={{ fontSize: 11, color: 'var(--color-text-muted)', whiteSpace: 'nowrap' }}>

                  onClick={e => { e.stopPropagation(); markRead(n.id); nav('iteration-reply'); }}
                >
                  Respond to Iteration →
                </antd.Button>
              )}
            </div>
          </div>
        ))}
      </antd.Card>

      <div style={{ marginTop: 16, fontSize: 12, color: 'var(--color-text-muted)', textAlign: 'center' }}>
        Notifications are retained for 90 days · Manage preferences in <antd.Typography.Link onClick={() => nav('profile')}>Profile & Settings</antd.Typography.Link>
      </div>
    </div>
  );
};

SCREENS['iteration-reply'] = function IterationReply({ nav }) {
  const app = window.MOCK.iterationApp;
  const req = app.iterationRequest;
  const [step, setStep] = React.useState(0);
  const [reply, setReply] = React.useState('');
  const [uploading, setUploading] = React.useState({});
  const [revised, setRevised] = React.useState({});
  const [submitting, setSubmitting] = React.useState(false);
  const [submitted, setSubmitted] = React.useState(false);

  const steps = ['Review Feedback', 'Upload Revisions', 'Confirm & Resubmit'];
  const daysLeft = Math.ceil((new Date(app.iterationDue) - new Date('2026-04-27')) / 86400000);

  const simulateUpload = (docKey) => {
    setUploading(u => ({ ...u, [docKey]: true }));
    setTimeout(() => {
      setUploading(u => ({ ...u, [docKey]: false }));
      setRevised(r => ({ ...r, [docKey]: true }));
    }, 1200);
  };

  if (submitted) {
    return (
      <div style={{ padding: 80, display: 'flex', flexDirection: 'column', alignItems: 'center', textAlign: 'center' }}>
        <div style={{ width: 80, height: 80, borderRadius: '50%', background: 'var(--color-primary-soft)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 36, color: 'var(--color-primary)', marginBottom: 24 }}>✓</div>
        <antd.Typography.Title level={3}>Revision Submitted</antd.Typography.Title>
        <antd.Typography.Text type="secondary" style={{ fontSize: 15, maxWidth: 480, lineHeight: 1.6 }}>
          Your revised application <antd.Typography.Text code>{app.id}</antd.Typography.Text> has been resubmitted. The officer will review your changes and respond within the SLA window.
        </antd.Typography.Text>
        <div style={{ marginTop: 24, padding: 20, background: 'var(--color-primary-soft)', borderRadius: 12 }}>
          <div style={{ fontSize: 11, color: 'var(--color-text-muted)', textTransform: 'uppercase', letterSpacing: .4, fontWeight: 600 }}>Application ID</div>
          <div style={{ fontSize: 22, fontWeight: 700, fontFamily: 'var(--font-mono)', color: 'var(--color-primary)', marginTop: 4 }}>{app.id}</div>
          <antd.Tag color="blue" style={{ marginTop: 8 }}>Under Review</antd.Tag>
        </div>
        <antd.Button type="primary" size="large" style={{ marginTop: 32 }} onClick={() => nav('applications')}>Back to My Applications</antd.Button>
      </div>
    );
  }

  return (
    <div style={{ padding: 32, maxWidth: 900, margin: '0 auto' }}>
      <antd.Breadcrumb style={{ marginBottom: 8 }} items={[
        { title: <a onClick={() => nav('applications')}>My Applications</a> },
        { title: <antd.Typography.Text code style={{ fontSize: 12 }}>{app.id}</antd.Typography.Text> },
        { title: 'Respond to Iteration' },
      ]} />
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', margin: '8px 0 24px' }}>
        <div>
          <antd.Typography.Title level={3} style={{ margin: 0 }}>Respond to Iteration Request</antd.Typography.Title>
          <antd.Typography.Text type="secondary">{app.product} · {app.brand} {app.model} · Scheme {app.scheme}</antd.Typography.Text>
        </div>
        <antd.Tag color={daysLeft < 14 ? 'red' : 'orange'} style={{ fontSize: 13, padding: '4px 10px', fontWeight: 600 }}>
          <ClockCircleOutlined style={{ marginRight: 4 }} />{daysLeft} days remaining (due {app.iterationDue})
        </antd.Tag>
      </div>

      <antd.Steps current={step} size="small" labelPlacement="vertical" responsive style={{ marginBottom: 24 }}
        items={steps.map(s => ({ title: s }))} />

      <antd.Card bordered>
        {/* ── STEP 0: Review Feedback ── */}
        {step === 0 && (
          <div>
            <antd.Alert
              type="warning" showIcon
              message={<b>Iteration Requested by {req.by} on {new Date(req.date).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' })}</b>}
              description="Please review and address all issues below before resubmitting. AI score was 62/100."
              style={{ marginBottom: 24 }}
            />

            <antd.Typography.Title level={5} style={{ marginBottom: 16 }}>Issues to Address</antd.Typography.Title>
            <div style={{ display: 'grid', gap: 12, marginBottom: 24 }}>
              {req.issues.map((issue, i) => (
                <div key={issue.id} style={{
                  padding: 16, borderRadius: 10,
                  border: `1.5px solid ${issue.severity === 'error' ? 'var(--color-danger)' : 'var(--color-warning)'}`,
                  background: issue.severity === 'error' ? 'rgba(198,40,40,0.04)' : 'rgba(184,114,0,0.04)',
                  display: 'flex', gap: 12,
                }}>
                  <div style={{ color: issue.severity === 'error' ? 'var(--color-danger)' : 'var(--color-warning)', fontSize: 18, flexShrink: 0, marginTop: 2 }}>
                    {issue.severity === 'error' ? <CloseCircleOutlined /> : <WarningOutlined />}
                  </div>
                  <div style={{ flex: 1 }}>
                    <antd.Tag color={issue.severity === 'error' ? 'red' : 'gold'} style={{ marginBottom: 6, fontSize: 10, fontWeight: 700 }}>
                      {issue.severity === 'error' ? 'MUST FIX' : 'RECOMMENDED'}
                    </antd.Tag>
                    <div style={{ fontSize: 13, lineHeight: 1.6 }}>{issue.text}</div>
                  </div>
                  <antd.Tag color="default" style={{ fontSize: 10, margin: 0, alignSelf: 'flex-start' }}>#{i + 1}</antd.Tag>
                </div>
              ))}
            </div>

            <antd.Divider />
            <antd.Typography.Title level={5} style={{ marginBottom: 12 }}>Officer's Message</antd.Typography.Title>
            <div style={{ padding: 16, background: 'var(--color-bg-subtle)', borderRadius: 10, borderLeft: '3px solid var(--color-primary)', fontSize: 13, lineHeight: 1.6, color: 'var(--color-text-secondary)' }}>
              "{req.message}"
            </div>
          </div>
        )}

        {/* ── STEP 1: Upload Revisions ── */}
        {step === 1 && (
          <div>
            <antd.Alert type="info" showIcon message="Upload revised documents for flagged issues. At minimum, replace the Test Report and provide the Wi-Fi 6E frequency declaration." style={{ marginBottom: 24 }} />

            <antd.Typography.Title level={5} style={{ marginBottom: 16 }}>Documents</antd.Typography.Title>

              {[
                { key: 'test',  name: 'Test Report (revised)',            note: 'Must include Wi-Fi 6E (6425–7125 MHz) range', required: true  },
                { key: 'decl',  name: 'Wi-Fi 6E Frequency Declaration',  note: 'New document — declare full frequency band compliance', required: true  },
                { key: 'std',   name: 'MTSFB G015:2022 Compliance Matrix',note: 'Justify Clause 4.3.1 and 4.3.2 N/A markings', required: true  },
                { key: 'bro',   name: 'Updated Technical Brochure',       note: 'Optional — only if content changed',           required: false },
              ].map(d => (
                <div key={d.key} style={{ padding: 14, border: `1.5px solid ${revised[d.key] ? 'var(--color-success)' : 'var(--color-border)'}`, borderRadius: 10, display: 'flex', alignItems: 'center', gap: 14, background: revised[d.key] ? 'rgba(27,127,72,0.04)' : '#fff' }}>
                  <div style={{ fontSize: 24, flexShrink: 0 }}>{revised[d.key] ? '✅' : '📄'}</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontWeight: 600, fontSize: 13 }}>
                      {d.name}
                      {d.required && <antd.Tag color="red" style={{ marginLeft: 8, fontSize: 10 }}>Required</antd.Tag>}
                    </div>
                    <div style={{ fontSize: 11, color: 'var(--color-text-muted)', marginTop: 2 }}>{d.note}</div>
                    {revised[d.key] && <div style={{ fontSize: 11, color: 'var(--color-success)', marginTop: 2 }}>✓ Uploaded successfully</div>}
                  </div>
                  <antd.Button
                    size="small" type={revised[d.key] ? 'default' : 'primary'}
                    icon={<UploadOutlined />}
                    loading={uploading[d.key]}
                    onClick={() => simulateUpload(d.key)}
                  >
                    {revised[d.key] ? 'Replace' : 'Upload'}
                  </antd.Button>
                </div>
              ))}
            </div>

            <antd.Divider />
            <antd.Typography.Title level={5} style={{ marginBottom: 8 }}>Message to Officer <antd.Typography.Text type="secondary" style={{ fontWeight: 400, fontSize: 13 }}>(optional)</antd.Typography.Text></antd.Typography.Title>
            <antd.Input.TextArea
              rows={4}
              placeholder="Explain what was changed and how each issue was resolved…"
              value={reply}
              onChange={e => setReply(e.target.value)}
              maxLength={1000}
              showCount
            />
          </div>
        )}

        {/* ── STEP 2: Confirm & Resubmit ── */}
        {step === 2 && (
          <div>
            <antd.Alert type="success" showIcon message="Ready to resubmit — all required documents uploaded." style={{ marginBottom: 24 }} />

            <antd.Typography.Title level={5} style={{ marginBottom: 16 }}>Resubmission Summary</antd.Typography.Title>
            <antd.Descriptions bordered size="small" column={1} style={{ marginBottom: 24 }}>
              <antd.Descriptions.Item label="Application ID"><antd.Typography.Text code>{app.id}</antd.Typography.Text></antd.Descriptions.Item>
              <antd.Descriptions.Item label="Product">{app.product} ({app.brand} {app.model})</antd.Descriptions.Item>
              <antd.Descriptions.Item label="Scheme">Scheme {app.scheme}</antd.Descriptions.Item>
              <antd.Descriptions.Item label="Iteration Due">{app.iterationDue} ({daysLeft} days remaining)</antd.Descriptions.Item>
              <antd.Descriptions.Item label="Revised Documents">
                <antd.Space wrap>
                  {Object.keys(revised).map(k => <antd.Tag key={k} color="green">✓ Uploaded</antd.Tag>)}
                  {Object.keys(revised).length === 0 && <antd.Typography.Text type="secondary">None (only existing docs will resubmit)</antd.Typography.Text>}
                </antd.Space>
              </antd.Descriptions.Item>
              {reply && <antd.Descriptions.Item label="Your message">{reply}</antd.Descriptions.Item>}
            </antd.Descriptions>

            <antd.Alert
              type="info" showIcon
              message="What happens next?"

            />

            <antd.Checkbox style={{ fontSize: 13 }}>

        {/* Navigation */}
        <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 28, paddingTop: 20, borderTop: '1px solid var(--color-divider)' }}>

          {step < steps.length - 1 && (
            <antd.Button type="primary" onClick={() => setStep(s => s + 1)}>
              {step === 0 ? 'Proceed to Upload →' : 'Review & Confirm →'}
            </antd.Button>
          )}
          {step === steps.length - 1 && (
            <antd.Button
              type="primary"
              loading={submitting}
              onClick={() => { setSubmitting(true); setTimeout(() => { setSubmitting(false); setSubmitted(true); }, 1600); }}
            >
              Submit Revision
            </antd.Button>
          )}
        </div>
      </antd.Card>
    </div>
  );
};

// ─── Forgot Password ──────────────────────────────────────────────────────────
// Standalone screen accessible via SCREENS['forgot-password'].
// Also rendered inline from LoginScreen via forgotMode state.
SCREENS['forgot-password'] = function ForgotPassword({ nav, onBack }) {
  const [step, setStep]       = React.useState(0); // 0=email, 1=otp, 2=new-password, 3=done
  const [email, setEmail]     = React.useState('');
  const [otp, setOtp]         = React.useState('');
  const [otpSent, setOtpSent] = React.useState(false);
  const [autoFill, setAutoFill] = React.useState(false);
  const [newPw, setNewPw]     = React.useState('');
  const [confirmPw, setConfirmPw] = React.useState('');
  const [loading, setLoading] = React.useState(false);

  const sendOtp = () => {
    if (!email) return;
    setLoading(true);
    setTimeout(() => {
      setLoading(false);
      setOtpSent(true);
      setStep(1);
      // Auto-fill OTP after 2.5s (demo effect)
      setTimeout(() => { setOtp('847291'); setAutoFill(true); }, 2500);
    }, 900);
  };

  const verifyOtp = () => {
    setLoading(true);
    setTimeout(() => { setLoading(false); setStep(2); }, 700);
  };

  const resetPw = () => {
    setLoading(true);
    setTimeout(() => { setLoading(false); setStep(3); }, 1000);
  };

  const pwStrength = (pw) => {
    let score = 0;
    if (pw.length >= 12) score++;
    if (/[A-Z]/.test(pw)) score++;
    if (/[0-9]/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;
    return score;
  };
  const strength = pwStrength(newPw);
  const strengthLabel = ['', 'Weak', 'Fair', 'Good', 'Strong'][strength];
  const strengthColor = ['', 'var(--color-danger)', 'var(--color-warning)', 'var(--color-info)', 'var(--color-success)'][strength];

  const wrapper = (children) => (
    <div style={{ minHeight: '100vh', background: 'linear-gradient(180deg,#F5F8FB 0%,#E7EEF6 100%)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 24 }}>
      <antd.Card bordered={false} style={{ width: '100%', maxWidth: 440, boxShadow: 'var(--elevation-2)', borderRadius: 16 }} bodyStyle={{ padding: 40 }}>
        <div style={{ textAlign: 'center', marginBottom: 28 }}>
          <img src="assets/mcmc-logo.png" alt="MCMC" style={{ width: 40, height: 40, background: 'var(--color-primary)', borderRadius: 8, padding: 4, marginBottom: 12 }} />
          <antd.Typography.Title level={4} style={{ margin: 0 }}>
            {step === 3 ? 'Password Reset' : 'Reset Your Password'}
          </antd.Typography.Title>
          <antd.Typography.Text type="secondary">NCEF · MCMC Certification Portal</antd.Typography.Text>
        </div>
        {children}
        {step < 3 && (
          <div style={{ textAlign: 'center', marginTop: 20 }}>
            <antd.Button type="link" onClick={() => onBack ? onBack() : nav('login')}>
              <ArrowLeftOutlined /> Back to Sign In
            </antd.Button>
          </div>
        )}
      </antd.Card>
    </div>
  );

  if (step === 0) return wrapper(
    <>
      <antd.Typography.Text type="secondary" style={{ display: 'block', marginBottom: 20, textAlign: 'center', fontSize: 13 }}>
        Enter the email address linked to your account. We'll send a one-time code to verify your identity.
      </antd.Typography.Text>
      <antd.Form layout="vertical" onFinish={sendOtp}>
        <antd.Form.Item label="Email Address" required>
          <antd.Input size="large" prefix={<MailOutlined />} placeholder="nurul@axiatadigital.com.my" value={email} onChange={e => setEmail(e.target.value)} />
        </antd.Form.Item>
        <antd.Button type="primary" size="large" block loading={loading} htmlType="submit">Send OTP</antd.Button>
      </antd.Form>
    </>
  );

  if (step === 1) return wrapper(
    <>
      <antd.Alert type="success" showIcon message={`OTP sent to ${email}`} description="Check your inbox. The code expires in 10 minutes." style={{ marginBottom: 20 }} />
      {autoFill && <antd.Alert type="info" message="Demo: OTP auto-filled (847291)" style={{ marginBottom: 12, fontSize: 11 }} />}
      <antd.Form layout="vertical" onFinish={verifyOtp}>
        <antd.Form.Item label="6-digit OTP" required>
          <antd.Input size="large" prefix={<KeyOutlined />} placeholder="••••••" maxLength={6} value={otp} onChange={e => setOtp(e.target.value)} style={{ letterSpacing: 8, fontSize: 20, textAlign: 'center' }} />
        </antd.Form.Item>
        <antd.Button type="primary" size="large" block loading={loading} htmlType="submit" disabled={otp.length !== 6}>Verify Code</antd.Button>
        <div style={{ textAlign: 'center', marginTop: 12 }}>
          <antd.Button type="link" size="small" onClick={sendOtp}>Resend OTP</antd.Button>
        </div>
      </antd.Form>
    </>
  );

  if (step === 2) return wrapper(
    <>
      <antd.Form layout="vertical" onFinish={resetPw}>
        <antd.Form.Item label="New Password" required extra="Min 12 characters · upper, lower, digit, symbol">
          <antd.Input.Password size="large" prefix={<LockOutlined />} placeholder="••••••••••••" value={newPw} onChange={e => setNewPw(e.target.value)} />
        </antd.Form.Item>
        {newPw.length > 0 && (
          <div style={{ marginBottom: 16 }}>
            <div style={{ display: 'flex', gap: 4, marginBottom: 4 }}>
              {[1,2,3,4].map(i => <div key={i} style={{ flex: 1, height: 4, borderRadius: 2, background: i <= strength ? strengthColor : 'var(--color-bg-subtle)' }} />)}
            </div>
            <div style={{ fontSize: 11, color: strengthColor, fontWeight: 600 }}>{strengthLabel}</div>
          </div>
        )}
        <antd.Form.Item label="Confirm New Password" required>
          <antd.Input.Password size="large" prefix={<LockOutlined />} placeholder="••••••••••••" value={confirmPw} onChange={e => setConfirmPw(e.target.value)}
            status={confirmPw && confirmPw !== newPw ? 'error' : ''} />
          {confirmPw && confirmPw !== newPw && <div style={{ fontSize: 12, color: 'var(--color-danger)', marginTop: 4 }}>Passwords do not match</div>}
        </antd.Form.Item>
        <antd.Button type="primary" size="large" block loading={loading} htmlType="submit" disabled={!newPw || newPw !== confirmPw || strength < 3}>
          Reset Password
        </antd.Button>
      </antd.Form>
    </>
  );

  // Step 3 — success
  return wrapper(
    <div style={{ textAlign: 'center' }}>
      <div style={{ fontSize: 48, marginBottom: 12 }}>✅</div>
      <antd.Typography.Title level={4}>Password Reset Successfully</antd.Typography.Title>
      <antd.Typography.Text type="secondary">Your new password is active. All other active sessions have been signed out for security.</antd.Typography.Text>
      <antd.Button type="primary" size="large" block style={{ marginTop: 24 }} onClick={() => onBack ? onBack() : nav('login')}>
        Sign In with New Password
      </antd.Button>
    </div>
  );
};

  const [loggedIn, setLoggedIn] = React.useState(() => sessionStorage.getItem('ncef.loggedIn') === '1');
  const [switchOpen, setSwitchOpen] = React.useState(false);
  const [sessionWarning, setSessionWarning] = React.useState(false);
  const [sessionCountdown, setSessionCountdown] = React.useState(60);
  const sessionTimerRef = React.useRef(null);
  const warningTimerRef = React.useRef(null);

  const SESSION_IDLE_MS = 30 * 60 * 1000; // 30 min idle → warning
  const SESSION_WARN_S  = 60;              // 60 s countdown before forced logout

  const resetSessionTimer = React.useCallback(() => {
    clearTimeout(sessionTimerRef.current);
    clearInterval(warningTimerRef.current);
    setSessionWarning(false);
    setSessionCountdown(SESSION_WARN_S);
    if (loggedIn) {
      sessionTimerRef.current = setTimeout(() => {
        setSessionWarning(true);
        setSessionCountdown(SESSION_WARN_S);
        let remaining = SESSION_WARN_S;
        warningTimerRef.current = setInterval(() => {
          remaining -= 1;
          setSessionCountdown(remaining);
          if (remaining <= 0) {
            clearInterval(warningTimerRef.current);
            setSessionWarning(false);
            setLoggedIn(false);
            setScreen('login');
          }
        }, 1000);
      }, SESSION_IDLE_MS);
    }
  }, [loggedIn]);

  React.useEffect(() => {
    const events = ['mousedown', 'keydown', 'touchstart', 'scroll'];
    const handlers = events.map(e => window.addEventListener(e, resetSessionTimer));
    resetSessionTimer();
    return () => events.forEach((e, i) => window.removeEventListener(e, resetSessionTimer));
  }, [resetSessionTimer]);

  const updateTweak = (key, value) => {
    const updated = { ...tweaks, [key]: value };
