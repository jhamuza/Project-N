// ──── ASSIGN OFFICER MODAL ────────────────────────────────────────────────────
function AssignOfficerModal({ open, onClose, onAssign, applicationId, currentAssigneeId }) {
  const officers = MOCK.officerPerformance || [];
  const [pick, setPick] = React.useState(currentAssigneeId || null);
  React.useEffect(() => { if (open) setPick(currentAssigneeId || null); }, [open, currentAssigneeId]);
  return (
    <antd.Modal open={open} onCancel={onClose}
      title={currentAssigneeId ? 'Reassign application' : 'Assign application'}
      width={520} okText={currentAssigneeId ? 'Reassign' : 'Assign'}
      okButtonProps={{ disabled: !pick || pick === currentAssigneeId }}
      onOk={() => { onAssign(pick); onClose(); }}>
      <div style={{ marginBottom: 12, fontSize: 13, color: 'var(--color-text-secondary)' }}>
        Application <antd.Typography.Text code>{applicationId}</antd.Typography.Text>
        {' '}— select a CPPG officer from team <antd.Tag>CPPG-TL-01</antd.Tag>
      </div>
      <div style={{ display: 'grid', gap: 8 }}>
        {officers.map(o => {
          const isPicked = pick === o.id;
          const isLead = o.role === 'team-lead';
          return (
            <div key={o.id} onClick={() => setPick(o.id)} style={{
              padding: 12, borderRadius: 10, cursor: 'pointer',
              border: `1.5px solid ${isPicked ? 'var(--color-primary)' : 'var(--color-border, #E5E7EB)'}`,
              background: isPicked ? 'rgba(11,79,145,0.04)' : '#fff',
              display: 'flex', alignItems: 'center', gap: 12,
            }}>
              <antd.Avatar style={{ background: isLead ? '#7B3FA0' : 'var(--color-primary)' }}>
                {o.name.split(' ').slice(-1)[0].slice(0, 2).toUpperCase()}
              </antd.Avatar>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 600, fontSize: 13, display: 'flex', alignItems: 'center', gap: 8 }}>
                  {o.name}
                  {isLead ? <antd.Tag color="purple" icon={<CrownOutlined />}>Team Lead</antd.Tag> : <antd.Tag>Officer</antd.Tag>}
                </div>
                <div style={{ fontSize: 11, color: 'var(--color-text-muted)' }}>
                  {o.id} · SLA {o.slaCompliance}% · {o.approved} approved · avg {o.avgTurnaround}h
                </div>
              </div>
              {isPicked && <CheckCircleOutlined style={{ color: 'var(--color-primary)', fontSize: 18 }} />}
            </div>
          );
        })}
      </div>
    </antd.Modal>
  );
}
window.AssignOfficerModal = AssignOfficerModal;

// ──── OFFICER QUEUE ────────────────────────────────────────────────────────────
function OfficerQueue({ nav, currentUser }) {
  const isLead = currentUser?.role === 'team-lead';
  const myId   = currentUser?.id;
  const officerById = React.useMemo(() => {
    const m = {};
    (MOCK.officerPerformance || []).forEach(o => { m[o.id] = o; });
    return m;
  }, []);
  const [overrides, setOverrides] = React.useState({});
  const resolved = React.useMemo(
    () => (MOCK.officerQueue || []).map(r => ({ ...r, assignedTo: overrides[r.id] ?? r.assignedTo })),
    [overrides]
  );
  const myCount         = resolved.filter(x => x.assignedTo === myId).length;
  const teamAssigned    = resolved.filter(x => x.assignedTo != null).length;
  const unassignedCount = resolved.filter(x => x.assignedTo == null).length;
  const [filter, setFilter]         = React.useState('mine');
  const [assignOpen, setAssignOpen] = React.useState(false);
  const [assignTarget, setAssignTarget] = React.useState(null);
  const list = React.useMemo(() => {
    if (!isLead) return resolved.filter(x => x.assignedTo === myId);
    if (filter === 'mine')       return resolved.filter(x => x.assignedTo === myId);
    if (filter === 'team')       return resolved.filter(x => x.assignedTo != null);
    if (filter === 'unassigned') return resolved.filter(x => x.assignedTo == null);
    return resolved;
  }, [isLead, filter, myId, resolved]);
  const myPerf = officerById[myId] || {};
  const kpis = isLead ? [
    { l: 'In My Queue',           v: myCount,         d: myCount ? '1 urgent (SLA < 12h)' : 'All clear', warn: myCount > 0 },
    { l: 'Team Pending',          v: resolved.length, d: `${unassignedCount} unassigned`, color: unassignedCount > 0 ? 'var(--color-warning)' : undefined },
    { l: 'Approved Today (Team)', v: 8,               d: 'Avg turnaround 4.2 hrs', color: 'var(--color-success)' },
    { l: 'Team SLA Compliance',   v: '96%',           d: 'Monthly target 95%', color: 'var(--color-success)' },
  ] : [
    { l: 'Assigned to Me',      v: myCount,                              d: myCount ? '1 urgent (SLA < 24h)' : 'All clear', warn: myCount > 0 },
    { l: 'Approved This Week',  v: Math.round((myPerf.approved || 0)/8), d: `${myPerf.approved || 0} lifetime approvals`, color: 'var(--color-success)' },
    { l: 'My Avg Turnaround',   v: `${myPerf.avgTurnaround || 0}h`,      d: 'Team avg 4.6h' },
    { l: 'My SLA Compliance',   v: `${myPerf.slaCompliance || 0}%`,      d: 'Monthly target 95%', color: (myPerf.slaCompliance || 0) >= 95 ? 'var(--color-success)' : 'var(--color-warning)' },
  ];
  return (
    <div style={{ padding: 32, maxWidth: 1400, margin: '0 auto' }}>
      <div style={{ fontSize: 12, color: 'var(--color-text-muted)', textTransform: 'uppercase', letterSpacing: .4, fontWeight: 600 }}>
        {currentUser?.title || 'CPPG Officer'} · {currentUser?.name || ''}
      </div>
      <antd.Typography.Title level={3} style={{ margin: '4px 0 20px' }}>
        {isLead ? 'Review Queue · Team View' : 'My Review Queue'}
      </antd.Typography.Title>
      <antd.Row gutter={[16,16]} style={{ marginBottom: 20 }}>
        {kpis.map((k, i) => (
          <antd.Col xs={12} md={6} key={i}>
            <div className="kpi-card">
              <div className="kpi-label">{k.l}</div>
              <div className="kpi-value" style={{ color: k.warn ? 'var(--color-warning)' : (k.color || 'inherit') }}>{k.v}</div>
              <div className="kpi-delta">{k.d}</div>
            </div>
          </antd.Col>
        ))}
      </antd.Row>
      <antd.Card bordered>
        {isLead && (
          <antd.Segmented value={filter} onChange={setFilter} style={{ marginBottom: 16 }} options={[
            { label: `My queue (${myCount})`, value: 'mine' },
            { label: `Team queue (${teamAssigned})`, value: 'team' },
            { label: `Unassigned (${unassignedCount})`, value: 'unassigned' },
          ]} />
        )}
        {!isLead && (
          <div style={{ marginBottom: 16, fontSize: 13, color: 'var(--color-text-secondary)' }}>
            Showing <b>{myCount}</b> applications assigned to you. Need help? Ask your Team Lead to reassign.
          </div>
        )}
        <antd.Table rowKey="id" dataSource={list} pagination={false}
          onRow={row => ({ onClick: e => { if (e.target.closest('.assign-btn')) return; nav('officer-review'); }, style: { cursor: 'pointer' } })}
          columns={[
            { title: 'App ID',    dataIndex: 'id',       render: v => <antd.Typography.Text code style={{ fontSize: 12 }}>{v}</antd.Typography.Text> },
            { title: 'Scheme',    dataIndex: 'scheme',   render: s => <SchemeBadge scheme={s} /> },
            { title: 'Applicant', dataIndex: 'applicant' },
            { title: 'Product',   dataIndex: 'product' },
            { title: 'AI Score',  dataIndex: 'aiScore',  render: s => <antd.Tag color={s >= 90 ? 'green' : s >= 70 ? 'orange' : 'red'} style={{ fontWeight: 600 }}>{s}</antd.Tag> },
            { title: 'Priority',  dataIndex: 'priority', render: p => <antd.Tag color={p === 'high' ? 'red' : p === 'low' ? 'default' : 'blue'}>{p}</antd.Tag> },
            { title: 'SLA',       dataIndex: 'slaHours', render: h => <antd.Tag color={h < 12 ? 'red' : h < 24 ? 'orange' : 'default'}>{h}h left</antd.Tag> },
            ...(isLead ? [{
              title: 'Assigned', dataIndex: 'assignedTo',
              render: (id, row) => id
                ? <antd.Tooltip title={officerById[id]?.name}><antd.Tag>{officerById[id]?.name?.split(' ').slice(-1)[0] || id}</antd.Tag></antd.Tooltip>
                : <antd.Button className="assign-btn" size="small" type="primary" icon={<TeamOutlined />}
                    onClick={e => { e.stopPropagation(); setAssignTarget(row.id); setAssignOpen(true); }}>Assign…</antd.Button>,
            }] : []),
            { title: 'Submitted', dataIndex: 'submitted', render: v => new Date(v).toLocaleDateString('en-GB', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' }) },
          ]}
        />
      </antd.Card>
      {isLead && (
        <AssignOfficerModal open={assignOpen} onClose={() => setAssignOpen(false)}
          applicationId={assignTarget}
          currentAssigneeId={assignTarget ? resolved.find(r => r.id === assignTarget)?.assignedTo : null}
          onAssign={officerId => {
            setOverrides(prev => ({ ...prev, [assignTarget]: officerId }));
            antd.message.success(`Assigned ${assignTarget} to ${officerById[officerId]?.name}`);
          }} />
      )}
    </div>
  );
}
SCREENS['officer-queue'] = OfficerQueue;

// ──── REPORTS & ANALYTICS ─────────────────────────────────────────────────────
SCREENS.reports = function Reports({ nav, currentUser }) {
  if (currentUser?.role === 'officer') return (
    <antd.Result status="403" icon={<LockOutlined style={{ color: 'var(--color-warning)' }} />}
      title="Restricted — Team Leads only"
      subTitle="Reports & Analytics is available to CPPG Team Leads. Contact your Team Lead for a shared summary."
      extra={<Button type="primary" onClick={() => nav('officer-queue')}>Back to My Queue</Button>}
      style={{ padding: '80px 24px' }} />
  );
  const [period, setPeriod] = React.useState('month');
  const trend = MOCK.monthlyTrend || [];
  const totalSubmitted  = trend.reduce((a, b) => a + b.submitted, 0);
  const totalApproved   = trend.reduce((a, b) => a + b.approved, 0);
  const totalAutoAccept = trend.reduce((a, b) => a + b.aiAutoAccepted, 0);
  const approvalRate    = totalSubmitted ? Math.round(totalApproved / totalSubmitted * 100) : 0;
  const maxSubmitted    = Math.max(...trend.map(d => d.submitted), 1);
  const BAR_W = 48, BAR_GAP = 24, PAD = 40, HEIGHT = 160;
  const chartW = trend.length * (BAR_W + BAR_GAP) + PAD;
  return (
    <div style={{ padding: 32, maxWidth: 1400, margin: '0 auto' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', marginBottom: 20 }}>
        <div>
          <div style={{ fontSize: 12, color: 'var(--color-text-muted)', textTransform: 'uppercase', letterSpacing: .4, fontWeight: 600 }}>Officer · CPPG</div>
          <antd.Typography.Title level={3} style={{ margin: '4px 0 0' }}>Reports & Analytics</antd.Typography.Title>
          <antd.Typography.Text type="secondary">MCMC NCEF · Certification performance · YTD 2026</antd.Typography.Text>
        </div>
        <Space>
          <antd.Segmented value={period} onChange={setPeriod} options={[{ label: 'This Month', value: 'month' }, { label: 'Last 3M', value: '3m' }, { label: 'YTD', value: 'ytd' }]} />
          <Button icon={<DownloadOutlined />}>Export PDF</Button>
        </Space>
      </div>
      <antd.Row gutter={[16,16]} style={{ marginBottom: 24 }}>
        {[
          { l: 'Applications YTD',  v: totalSubmitted,  d: '+18% vs same period last year', color: 'var(--color-primary)' },
          { l: 'Approval Rate',     v: `${approvalRate}%`, d: `${totalApproved} approved of ${totalSubmitted}`, color: 'var(--color-success)' },
          { l: 'AI Auto-Accepted',  v: totalAutoAccept, d: `${totalApproved ? Math.round(totalAutoAccept/totalApproved*100) : 0}% of approvals (≥90 threshold)`, color: 'var(--color-info)' },
          { l: 'SLA Compliance',    v: '95.3%',         d: 'Team target: 95% · On track', color: 'var(--color-success)' },
        ].map((k, i) => (
          <antd.Col xs={12} md={6} key={i}>
            <div className="kpi-card">
              <div className="kpi-label">{k.l}</div>
              <div className="kpi-value" style={{ color: k.color }}>{k.v}</div>
              <div className="kpi-delta">{k.d}</div>
            </div>
          </antd.Col>
        ))}
      </antd.Row>
      <antd.Row gutter={[16,16]}>
        <antd.Col xs={24} lg={16}>
          <antd.Card title="Application Volume Trend" bordered extra={
            <Space size={16}>
              {[['Submitted','var(--color-primary)'],['Approved','var(--color-success)'],['AI Auto-Accept','var(--color-info)']].map(([l,c]) => (
                <Space key={l} size={6}><span style={{ width:10, height:10, borderRadius:2, background:c, display:'inline-block' }} /><span style={{ fontSize:12 }}>{l}</span></Space>
              ))}
            </Space>
          }>
            <svg width="100%" viewBox={`0 0 ${chartW} ${HEIGHT+50}`} style={{ overflow:'visible' }}>
              {[0,25,50,75,100].map(pct => {
                const y = HEIGHT - (pct/100)*HEIGHT;
                return <g key={pct}>
                  <line x1={PAD} y1={y} x2={chartW} y2={y} stroke="var(--color-divider)" strokeWidth={1} />
                  <text x={PAD-6} y={y+4} textAnchor="end" fontSize={10} fill="var(--color-text-muted)">{Math.round((pct/100)*maxSubmitted)}</text>
                </g>;
              })}
              {trend.map((d, i) => {
                const hS = Math.round((d.submitted/maxSubmitted)*HEIGHT);
                const hA = Math.round((d.approved/maxSubmitted)*HEIGHT);
                const hAI = Math.round((d.aiAutoAccepted/maxSubmitted)*HEIGHT);
                const x = PAD + i*(BAR_W+BAR_GAP);
                return <g key={i}>
                  <rect x={x} y={HEIGHT-hS} width={BAR_W} height={hS} rx={4} fill="var(--color-primary)" opacity={0.85} />
                  <rect x={x+4} y={HEIGHT-hA} width={BAR_W-8} height={hA} rx={3} fill="var(--color-success)" opacity={0.85} />
                  <circle cx={x+BAR_W/2} cy={HEIGHT-hAI-8} r={5} fill="var(--color-info)" />
                  <text x={x+BAR_W/2} y={HEIGHT+20} textAnchor="middle" fontSize={12} fontWeight={600} fill="var(--color-text-secondary)">{d.month}</text>
                </g>;
              })}
            </svg>
          </antd.Card>
          <antd.Card title="Top Applicants by Volume" bordered style={{ marginTop:16 }}>
            <antd.Table rowKey="id" dataSource={MOCK.topApplicants || []} pagination={false} size="small" columns={[
              { title: 'Company',      dataIndex: 'name',        render: (v,r) => <div><div style={{ fontWeight:600 }}>{v}</div><div style={{ fontSize:11, color:'var(--color-text-muted)' }}>{r.id}</div></div> },
              { title: 'Submitted',    dataIndex: 'submissions', align:'center', render: v => <antd.Tag>{v}</antd.Tag> },
              { title: 'Approved',     dataIndex: 'approved',    align:'center', render: v => <antd.Tag color="green">{v}</antd.Tag> },
              { title: 'Approval Rate',align:'center', render: (_,r) => { const pct = Math.round(r.approved/r.submissions*100); return <antd.Progress percent={pct} size="small" strokeColor={pct>=90?'var(--color-success)':pct>=70?'var(--color-warning)':'var(--color-danger)'} style={{ width:100 }} />; }},
              { title: 'Avg AI Score', dataIndex: 'aiAvg',       align:'center', render: v => <antd.Tag color={v>=90?'green':v>=70?'orange':'red'} style={{ fontWeight:600 }}>{v}</antd.Tag> },
            ]} />

        <antd.Col xs={24} lg={8}>
          <antd.Card title="AI Score Distribution" bordered style={{ marginBottom:16 }}>
            {[
              { label:'Auto-Accept (≥90)',       count:totalAutoAccept, pct: totalApproved ? Math.round(totalAutoAccept/totalApproved*100) : 0, color:'var(--color-success)' },
              { label:'Priority Review (70–89)', count:totalApproved-totalAutoAccept-Math.round(totalApproved*0.08), pct: totalApproved ? Math.round((totalApproved-totalAutoAccept-Math.round(totalApproved*0.08))/totalApproved*100) : 0, color:'var(--color-warning)' },

    <antd.Result status="403" icon={<LockOutlined style={{ color:'var(--color-warning)' }} />}
      title="Restricted — Team Leads only"

      style={{ padding:'80px 24px' }} />
  );
  const [actorFilter, setActorFilter] = React.useState('all');
  const [eventFilter, setEventFilter] = React.useState([]);
  const [q, setQ] = React.useState('');
  const [expanded, setExpanded] = React.useState(null);
  const logs = MOCK.auditLog || [];
  const eventTypes = [...new Set(logs.map(e => e.event))];
  const filtered = logs.filter(e => {
    if (actorFilter !== 'all' && e.actorRole !== actorFilter) return false;

    if (ev.includes('Reject'))    return <CloseCircleOutlined />;
    if (ev.includes('Iteration')) return <WarningOutlined />;
    if (ev.includes('Payment'))   return <CreditCardOutlined />;

        </div>
        <Button icon={<DownloadOutlined />}>Export CSV</Button>
      </div>
      <antd.Card bordered style={{ marginBottom:16 }}>
        <antd.Row gutter={[12,12]} align="middle">
          <antd.Col flex="auto">
            <Input placeholder="Search actor, event, application ID…" prefix={<SearchOutlined style={{ color:'var(--color-text-muted)' }} />} value={q} onChange={e => setQ(e.target.value)} />
          </antd.Col>
          <antd.Col>
            <antd.Segmented value={actorFilter} onChange={setActorFilter} options={[{ label:'All Actors', value:'all' }, 'Officer', 'Supplier', 'System'].map(r => typeof r === 'string' ? { label:r, value:r } : r)} />
          </antd.Col>
          <antd.Col>
            <antd.Select mode="multiple" placeholder="Filter by event type" style={{ minWidth:220 }} value={eventFilter} onChange={setEventFilter} options={eventTypes.map(t => ({ value:t, label:t }))} maxTagCount={2} />

      <antd.Card bordered bodyStyle={{ padding:0 }}>
        <div style={{ padding:'10px 16px', background:'var(--color-bg-subtle)', borderBottom:'1px solid var(--color-divider)', display:'flex', gap:16, fontSize:11, fontWeight:700, color:'var(--color-text-muted)', textTransform:'uppercase', letterSpacing:.4 }}>
          <span style={{ width:160 }}>Timestamp</span><span style={{ width:36 }} /><span style={{ flex:1 }}>Event / Actor</span><span style={{ width:140 }}>Application</span><span style={{ width:110 }}>IP Address</span>
        </div>
        {filtered.map((e) => (
          <div key={e.id} style={{ borderBottom:'1px solid var(--color-divider)' }}>
            <div onClick={() => setExpanded(expanded===e.id ? null : e.id)} style={{ padding:'12px 16px', display:'flex', gap:16, alignItems:'center', cursor:'pointer', background:expanded===e.id ? 'var(--color-primary-soft)' : 'transparent', transition:'background .15s' }}>

                <div style={{ fontSize:11, color:'var(--color-text-muted)', marginTop:2 }}>{e.actor} · <antd.Tag color={roleColor[e.actorRole]} style={{ fontSize:10, padding:'0 5px', lineHeight:'16px' }}>{e.actorRole}</antd.Tag></div>
              </span>
              <span style={{ width:140, flexShrink:0 }}>{e.appId ? <antd.Typography.Text code style={{ fontSize:11 }}>{e.appId}</antd.Typography.Text> : <antd.Typography.Text type="secondary" style={{ fontSize:11 }}>—</antd.Typography.Text>}</span>
              <span style={{ width:110, fontSize:11, fontFamily:'var(--font-mono)', color:'var(--color-text-muted)', flexShrink:0 }}>{e.ip}</span>
            </div>
            {expanded===e.id && (
              <div style={{ padding:'10px 16px 14px', background:'var(--color-primary-soft)', borderTop:'1px solid var(--color-primary)', display:'flex', gap:16 }}>
                <span style={{ width:196, flexShrink:0 }} />
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:11, color:'var(--color-text-muted)', textTransform:'uppercase', letterSpacing:.4, fontWeight:700, marginBottom:4 }}>Detail</div>

      </antd.Card>
    </div>
  );
};

// ──── MINA QA ENGINE ─────────────────────────────────────────────────────────
function minaRespond(q) {
  const lq = q.toLowerCase();
  if (/scheme\s*a\b|scheme a/.test(lq))
    return 'Scheme A covers telecommunications and broadcast equipment that emits RF radiation. Required documents: SSM cert, technical brochure, SIRIM/accredited lab test report, and product photos. Processing time: 15–20 working days.';
  if (/scheme\s*b\b|scheme b/.test(lq))
    return 'Scheme B applies to Category I equipment (wired, low-risk). Submit: SSM cert, technical brochure, self-declaration form, and product photos. Lab test report is not mandatory unless requested by MCMC. Processing: 10–15 working days.';
  if (/scheme\s*c\b|scheme c/.test(lq))
    return 'Scheme C is for recognised standard equipment with an AI confidence score ≥ 90. Applications scoring ≥ 90 are auto-accepted without officer review. The certificate is issued within 3 working days after payment.';
  if (/scheme\s*d\b|scheme d/.test(lq))
    return 'Scheme D covers temporary import for R&D, exhibitions, or demonstrations. Maximum validity: 12 months (non-renewable). A written undertaking must be submitted stating the equipment will be re-exported or destroyed after use.';
  if (/document|what.*need|require/.test(lq))
    return 'Standard documents for most schemes: (1) SSM Business Registration, (2) Technical Brochure / Datasheet, (3) Accredited Test Report (Scheme A/D), (4) Product Photos — front, back, label, (5) SDoC form signed by authorised representative.';
  if (/certif.*valid|how long.*certif|expir/.test(lq))
    return 'NCEF certificates are valid for 3 years from the issue date. You will receive an expiry alert 90 days and 60 days before expiry. Certificates can be renewed up to 30 days before expiration — no late-renewal penalty if initiated before expiry.';
  if (/fee|cost|payment|price|rm|how much/.test(lq))
    return 'NCEF Fee Schedule 2026: Scheme A — RM 1,200/yr, Scheme B — RM 800/yr, Scheme C — RM 600/yr, Scheme D — RM 500 (one-time). Accepted payment methods: FPX, credit/debit card, corporate online banking. Invoice is auto-generated after submission.';
  if (/imei|serial|sn\b/.test(lq))
    return 'After your certificate is issued, register the device\'s IMEI or serial numbers via Register IMEI / SN in the sidebar. Batch upload (CSV) is supported for up to 10,000 units. Registration is required before customs clearance.';
  if (/status|where.*applicat|track/.test(lq))
    return 'Check My Applications in the sidebar for real-time status. Status flow: Draft → Submitted → Under Review → Iteration (if changes needed) → Approved / Rejected. Average processing: Scheme A 15 days, Scheme B 10 days, Scheme C 3 days.';
  if (/iteration|rejected|change.*request|officer.*request/.test(lq))
    return 'An iteration request means the officer needs additional information or corrections. Open the notification or go to My Applications, click Respond to Iteration, upload the revised documents, and resubmit. You have the deadline stated in the request — typically 14–30 days.';
  if (/special.*approv|sa\b/.test(lq))
    return 'Special Approval (SA) is for devices outside the standard NCEF schemes — e.g. R&D prototypes, jamming equipment with a lawful purpose, or non-standard frequency use. SA applications go through a 3-tier workflow: Recommender → Verifier → Approver. Processing: 30–45 working days.';
  if (/modif|amend|update.*cert/.test(lq))
    return 'A modification request updates an existing certificate — for example, adding new models or changing the company name. Submit via Modification Request in the sidebar. The existing certificate remains valid during review.';
  if (/sdoc|declaration|self.declar/.test(lq))
    return 'The SDoC (Supplier Declaration of Conformity) wizard guides you through 4 steps: (1) Applicant details, (2) Device & technical specs, (3) Document upload, (4) Declaration & review. Save as draft at any step — drafts are kept for 30 days.';
  if (/consult|agent|assist/.test(lq))
    return 'Authorised NCEF consultants can submit and manage applications on your behalf. Go to Consultants in the sidebar to search the approved consultant registry, invite a consultant, or revoke access. Note: you remain legally responsible for the declaration.';
  if (/sla|turnaround|how.*long.*approv/.test(lq))
    return 'MCMC targets: Scheme A 15 WD, Scheme B 10 WD, Scheme C 3 WD, Special Approval 45 WD. SLA clock pauses during iteration periods. You will receive notifications at 7 days and 3 days before SLA breach.';
  if (/contact|mcmc|help|support|email|phone/.test(lq))
    return 'MCMC CPPG Helpdesk: cppg@mcmc.gov.my · +603-8688 8000. Portal support: itsupport@mcmc.gov.my. Office hours: Mon–Thu 8:30–17:30, Fri 8:00–12:15 & 14:45–17:30 (MYT). For urgent SLA issues, quote your App ID in the subject line.';
  if (/ai.*score|confidence|auto.accept|threshold/.test(lq))
    return 'The AI compliance score (0–100) is calculated from document completeness, test report clauses, and label accuracy. Score ≥ 90: Scheme C auto-accept. Score 70–89: priority review with officer flags. Score < 70: full manual review. You can request a re-score after uploading corrected documents.';
  if (/import|customs|permit/.test(lq))
    return 'A valid NCEF certificate is required for customs clearance of regulated equipment. The customs permit reference is embedded in the certificate QR code. For bulk imports, use the IMEI/SN batch registration to cover each unit.';
  return 'I\'m not sure about that specific query. Try asking about: schemes (A/B/C/D), required documents, certificate validity, fees, IMEI registration, application status, or contact MCMC CPPG at cppg@mcmc.gov.my for complex cases.';
}

// ──── MINA DRAWER (interactive) ───────────────────────────────────────────────
function MinaDrawer({ open, onClose, currentUser }) {
  const greeting = currentUser?.name ? `Hi ${currentUser.name.split(' ').slice(-2)[0]}! ` : 'Hi! ';
  const [msgs, setMsgs] = React.useState([{ role:'bot', t: greeting + "I'm MINA, your NCEF assistant. Ask me about schemes, documents, fees, or application status." }]);
  const [input, setInput] = React.useState('');
  const [typing, setTyping] = React.useState(false);
  const endRef = React.useRef(null);
  React.useEffect(() => { endRef.current?.scrollIntoView({ behavior:'smooth' }); }, [msgs]);
  const send = (text) => {
    const q = (text || input).trim();
    if (!q) return;
    setInput('');
    setMsgs(m => [...m, { role:'user', t:q }]);
    setTyping(true);
    setTimeout(() => {
      setTyping(false);
      setMsgs(m => [...m, { role:'bot', t: minaRespond(q) }]);
    }, 500 + Math.random()*400);
  };
  const quickPicks = ['Documents for Scheme B?', 'Check application status', 'How long is a cert valid?', 'Fee breakdown'];
  return (
    <Drawer title={<Space><RobotOutlined style={{ color:'var(--color-primary)' }} /><span>MINA · NCEF Assistant</span></Space>}
      placement="right" onClose={onClose} open={open} width={400}
      bodyStyle={{ display:'flex', flexDirection:'column', padding:0, height:'100%' }}>
      <div style={{ flex:1, overflowY:'auto', padding:16, display:'flex', flexDirection:'column', gap:10 }}>
        {msgs.map((m, i) => (
          <div key={i} style={{ alignSelf: m.role==='user'?'flex-end':'flex-start', maxWidth:'85%', padding:'10px 14px', borderRadius: m.role==='user'?'14px 14px 4px 14px':'4px 14px 14px 14px', background: m.role==='user'?'var(--color-primary)':'var(--color-bg-subtle)', color: m.role==='user'?'#fff':'inherit', fontSize:13, lineHeight:1.5 }}>{m.t}</div>
        ))}
        {typing && (
          <div style={{ alignSelf:'flex-start', padding:'10px 16px', borderRadius:'4px 14px 14px 14px', background:'var(--color-bg-subtle)', display:'flex', gap:4 }}>
            {[0,1,2].map(i => <div key={i} style={{ width:7, height:7, borderRadius:'50%', background:'var(--color-text-muted)', animation:`pulse 1.2s ${i*0.2}s infinite` }} />)}
          </div>
        )}
        <div ref={endRef} />
      </div>
      <div style={{ padding:'8px 16px', borderTop:'1px solid var(--color-divider)', display:'flex', gap:6, flexWrap:'wrap' }}>
        {quickPicks.map((q, i) => <antd.Tag key={i} style={{ cursor:'pointer', fontSize:11 }} onClick={() => send(q)}>{q}</antd.Tag>)}
      </div>
      <div style={{ padding:'12px 16px', borderTop:'1px solid var(--color-divider)' }}>
        <Input.Search value={input} onChange={e => setInput(e.target.value)}
          onSearch={() => send()} onKeyDown={e => e.key==='Enter' && send()}
          enterButton={<SendOutlined />} placeholder="Ask MINA…" style={{ width:'100%' }} />
      </div>
    </Drawer>
  );
}

  const [screen, setScreen]                 = React.useState(() => localStorage.getItem('ncef.screen') || DEFAULT_SCREEN_BY_ROLE[TWEAK_DEFAULTS.role] || 'dashboard');
  const [sidebarCollapsed, setSidebarCollapsed] = React.useState(false);
  const [minaOpen, setMinaOpen]             = React.useState(false);
  const [loggedIn, setLoggedIn]             = React.useState(() => sessionStorage.getItem('ncef.loggedIn') === '1');
  const [switchOpen, setSwitchOpen]         = React.useState(false);
  const [sessionWarning, setSessionWarning] = React.useState(false);
  const [sessionCountdown, setSessionCountdown] = React.useState(60);
  const sessionTimerRef  = React.useRef(null);
  const warningTimerRef  = React.useRef(null);
  const SESSION_IDLE_MS  = 30 * 60 * 1000;
  const SESSION_WARN_S   = 60;

  const resetSessionTimer = React.useCallback(() => {
    clearTimeout(sessionTimerRef.current);
    clearInterval(warningTimerRef.current);
    setSessionWarning(false);
    setSessionCountdown(SESSION_WARN_S);
    if (loggedIn) {
      sessionTimerRef.current = setTimeout(() => {
        setSessionWarning(true);
        setSessionCountdown(SESSION_WARN_S);
        let remaining = SESSION_WARN_S;
        warningTimerRef.current = setInterval(() => {
          remaining -= 1;
          setSessionCountdown(remaining);
          if (remaining <= 0) {
            clearInterval(warningTimerRef.current);
            setSessionWarning(false);
            setLoggedIn(false);
            sessionStorage.removeItem('ncef.loggedIn');
            setScreen('login');
          }
        }, 1000);
      }, SESSION_IDLE_MS);
    }
  }, [loggedIn]);

  React.useEffect(() => {
    const events = ['mousedown','keydown','touchstart','scroll'];
    events.forEach(e => window.addEventListener(e, resetSessionTimer));
    resetSessionTimer();
    return () => events.forEach(e => window.removeEventListener(e, resetSessionTimer));
  }, [resetSessionTimer]);

  React.useEffect(() => { localStorage.setItem('ncef.screen', screen); }, [screen]);
  React.useEffect(() => { sessionStorage.setItem('ncef.loggedIn', loggedIn ? '1' : '0'); }, [loggedIn]);

  React.useEffect(() => {
    const handler = e => {
      if (e.data?.type === '__activate_edit_mode')   setEditMode(true);
      if (e.data?.type === '__deactivate_edit_mode')  setEditMode(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type:'__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const updateTweak = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
    window.parent.postMessage({ type:'__edit_mode_set_keys', edits:{ [k]:v } }, '*');
  };

  const currentUser = (MOCK.profiles || {})[tweaks.role] || (MOCK.profiles || {}).supplier || {};
  const isSupplier  = tweaks.role === 'supplier';
  const currentNav  = NAV_BY_ROLE[tweaks.role] || NAV_SUPPLIER;

  React.useEffect(() => {
    if (!currentNav.find(n => n.key === screen)) setScreen(DEFAULT_SCREEN_BY_ROLE[tweaks.role] || 'dashboard');
  }, [tweaks.role]);

  const handleSwitchProfile = (newRole) => {
    updateTweak('role', newRole);
    setScreen(DEFAULT_SCREEN_BY_ROLE[newRole] || 'dashboard');
  };
  const handleLogout = () => { setLoggedIn(false); sessionStorage.removeItem('ncef.loggedIn'); setScreen('login'); };
  const handleLogin  = (role) => { updateTweak('role', role); setScreen(DEFAULT_SCREEN_BY_ROLE[role] || 'dashboard'); setLoggedIn(true); };

  // Login gate
  if (!loggedIn) {
    const Login = SCREENS.login;
    if (!Login) return (
      <ConfigProvider theme={{ token:{ colorPrimary:'#0B4F91' } }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'center', height:'100vh', background:'#F5F8FB', flexDirection:'column', gap:24 }}>
          <img src="assets/mcmc-logo.png" alt="MCMC" style={{ width:64, height:64, objectFit:'contain' }} />
          <div style={{ fontSize:24, fontWeight:700, color:'#0B4F91' }}>NCEF Portal</div>
          <Button type="primary" size="large" onClick={() => { setLoggedIn(true); sessionStorage.setItem('ncef.loggedIn','1'); }}>Enter Portal</Button>
        </div>
      </ConfigProvider>
    );
    return (
      <ConfigProvider theme={{ token:{ colorPrimary:'#0B4F91', colorSuccess:'#1B7F48', colorWarning:'#B87200', colorError:'#C62828', colorInfo:'#0F6ABF', fontFamily:"Inter, -apple-system, 'Segoe UI', sans-serif", borderRadius:8, colorBgLayout:'#F5F8FB' } }}>
        <Login onLogin={handleLogin} />
      </ConfigProvider>
    );
  }

  const SUPPLIER_ONLY = new Set(['dashboard','sdoc-wizard','special-approval','importation','certificates','imei-register','cert-renewal','onboarding']);
  const isRestricted  = SUPPLIER_ONLY.has(screen) && !isSupplier;
  const ScreenComp = isRestricted
    ? () => (
        <div style={{ padding:32 }}>
          <antd.Result status="403" icon={<LockOutlined style={{ color:'var(--color-warning)' }} />}
            title="Restricted to Suppliers"
            subTitle="This screen is reserved for supplier-tier users. Use Switch Profile in the top-right menu to demo the supplier flow."
            extra={<Button type="primary" onClick={() => setScreen(DEFAULT_SCREEN_BY_ROLE[tweaks.role])}>Back to Home</Button>} />
        </div>
      )
    : (SCREENS[screen] || (() => <div style={{ padding:40, color:'var(--color-text-secondary)' }}>Screen "{screen}" not found.</div>));

  const roleAccentColor = { supplier:'var(--color-primary)', 'team-lead':'#7B3FA0', officer:'#0F6ABF', recommender:'#2E7D32', verifier:'#E65100', approver:'#B71C1C' };
  const accentColor = roleAccentColor[tweaks.role] || 'var(--color-primary)';

  const notifs = (MOCK.notifications || []);
  const unreadCount = notifs.filter(n => !n.read).length;
  const catColor = { iteration:'var(--color-warning)', payment:'var(--color-success)', approved:'var(--color-success)', expiry:'var(--color-warning)', rejected:'var(--color-danger)', system:'var(--color-info)' };
  const bellItems = [
    ...notifs.slice(0,5).map(n => ({
      key: n.id, label: (
        <div style={{ maxWidth:280, padding:'4px 0' }} onClick={() => setScreen('notifications')}>
          <div style={{ display:'flex', gap:8, alignItems:'flex-start' }}>
            {!n.read && <span style={{ width:7, height:7, borderRadius:'50%', background:'var(--color-primary)', marginTop:5, flexShrink:0 }} />}
            <div style={{ flex:1, paddingLeft: n.read ? 15 : 0 }}>
              <div style={{ fontWeight: n.read ? 400 : 600, fontSize:12, lineHeight:1.4, color:'var(--color-text)' }}>{n.title}</div>
              <div style={{ fontSize:11, color:'var(--color-text-muted)', marginTop:2 }}>{new Date(n.ts).toLocaleDateString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}</div>
            </div>
          </div>
        </div>
      ),
    })),
    { type:'divider' },
    { key:'view-all', label:<div style={{ textAlign:'center', fontSize:12, color:'var(--color-primary)', cursor:'pointer' }} onClick={() => setScreen('notifications')}>View all notifications</div> },
  ];

  return (
    <ConfigProvider theme={{ token:{ colorPrimary:'#0B4F91', colorSuccess:'#1B7F48', colorWarning:'#B87200', colorError:'#C62828', colorInfo:'#0F6ABF', fontFamily:"Inter, -apple-system, 'Segoe UI', sans-serif", borderRadius:8, colorBgLayout:'#F5F8FB' }, components:{ Menu:{ itemHeight:40 } } }}>
      <Layout style={{ minHeight:'100vh' }} className={tweaks.denseTables ? 'ncef-compact' : ''}>
        <Sider width={240} collapsedWidth={72} collapsed={sidebarCollapsed} style={{ background:'#fff', borderRight:'1px solid var(--color-divider)' }} theme="light">
          <div style={{ padding:'18px 16px', borderBottom:'1px solid var(--color-divider)', display:'flex', alignItems:'center', gap:12, minHeight:72 }}>
            <img src="assets/mcmc-logo.png" alt="MCMC" style={{ width:40, height:40, objectFit:'contain', flexShrink:0 }} />
            {!sidebarCollapsed && (
              <div>
                <div style={{ fontWeight:700, fontSize:16, lineHeight:1.1, color:'var(--color-primary)', letterSpacing:.2 }}>NCEF</div>
                <div style={{ fontSize:10, color:'var(--color-text-muted)', letterSpacing:.3, marginTop:2 }}>MCMC · Certification</div>
              </div>
            )}
          </div>
          <Menu selectedKeys={[screen]} mode="inline" onClick={e => setScreen(e.key)} items={currentNav} style={{ border:'none', marginTop:8 }} />
          {!sidebarCollapsed && isSupplier && (
            <div style={{ position:'absolute', bottom:16, left:16, right:16 }}>
              <div style={{ padding:12, background:'var(--color-primary-soft)', borderRadius:10, fontSize:11 }}>
                <div style={{ fontWeight:700, color:'var(--color-primary)', marginBottom:4, display:'flex', alignItems:'center', gap:6 }}><RobotOutlined /> MINA assistant</div>
                <div style={{ color:'var(--color-text-secondary)', lineHeight:1.5 }}>Ask about schemes, documents, or application status.</div>
                <Button type="link" size="small" style={{ padding:0, marginTop:4 }} onClick={() => setMinaOpen(true)}>Open chat →</Button>
              </div>
            </div>
          )}
        </Sider>
        <Layout>
          <Header style={{ background:'#fff', borderBottom:'1px solid var(--color-divider)', padding:'0 24px', display:'flex', alignItems:'center', justifyContent:'space-between', height:56, lineHeight:'normal' }}>
            <Space size="middle">
              <Button type="text" icon={<MenuOutlined />} onClick={() => setSidebarCollapsed(!sidebarCollapsed)} />
              <Input placeholder="Search applications, certificates, IMEIs…" prefix={<SearchOutlined style={{ color:'var(--color-text-muted)' }} />} style={{ width:340 }} />
            </Space>
            <Space size="middle">
              <Dropdown menu={{ items: bellItems }} trigger={['click']} placement="bottomRight" overlayStyle={{ width:320 }}>
                <Badge count={unreadCount} size="small"><Button type="text" icon={<BellOutlined style={{ fontSize:18 }} />} /></Badge>
              </Dropdown>
              <Dropdown menu={{ items:[{ key:'en', label:'English' },{ key:'bm', label:'Bahasa Melayu' }] }}>
                <Button type="text" icon={<GlobalOutlined />}>EN</Button>
              </Dropdown>
              <Dropdown menu={{ items:[
                { key:'profile', icon:<UserOutlined />,          label:'Profile & Settings',  onClick:() => setScreen('profile') },
                { key:'switch',  icon:<SwapOutlined />,          label:'Switch Profile',       onClick:() => setSwitchOpen(true) },
                { key:'help',    icon:<QuestionCircleOutlined />, label:'Help Centre' },
                { key:'edit',    icon:<EditOutlined />,           label: editMode ? 'Exit Edit Mode' : 'Edit Mode', onClick:() => setEditMode(!editMode) },
                { type:'divider' },
                { key:'logout',  icon:<LogoutOutlined />, label:'Sign out', danger:true, onClick:handleLogout },
              ] }}>
                <Space style={{ cursor:'pointer' }}>
                  <Avatar style={{ background:accentColor }}>{currentUser.initials || '?'}</Avatar>
                  <div style={{ textAlign:'left', display: typeof window !== 'undefined' && window.innerWidth > 640 ? 'block' : 'none' }}>
                    <div style={{ fontSize:13, fontWeight:600, lineHeight:1.2 }}>{currentUser.name}</div>
                    <div style={{ fontSize:11, color:'var(--color-text-muted)' }}>
                      {currentUser.title}{currentUser.supplierId ? ` · ${currentUser.supplierId}` : ''}{currentUser.id && !currentUser.supplierId ? ` · ${currentUser.id}` : ''}
                    </div>
                  </div>
                </Space>
              </Dropdown>
            </Space>
          </Header>
          <Content style={{ overflow:'auto' }}>
            <ScreenComp nav={setScreen} tweaks={tweaks} currentUser={currentUser} />
          </Content>
        </Layout>

        {isSupplier && (
          <div className="mina-fab" onClick={() => setMinaOpen(true)}>
            <span className="pulse" />
            <RobotOutlined style={{ fontSize:22 }} />
          </div>
        )}

        <SwitchProfileModal open={switchOpen} currentRole={tweaks.role} onClose={() => setSwitchOpen(false)} onSwitch={handleSwitchProfile} />
        <MinaDrawer open={minaOpen} onClose={() => setMinaOpen(false)} currentUser={currentUser} />

        <antd.Modal open={sessionWarning} closable={false} maskClosable={false} width={420}
          footer={[
            <Button key="logout" danger onClick={() => { setSessionWarning(false); handleLogout(); }}>Sign out now</Button>,
            <Button key="stay"   type="primary" onClick={resetSessionTimer}>Stay signed in</Button>,
          ]}
          title={<Space><ClockCircleOutlined style={{ color:'var(--color-warning)' }} /> Session expiring soon</Space>}>
          <div style={{ textAlign:'center', padding:'16px 0' }}>
            <div style={{ fontSize:56, fontWeight:700, color: sessionCountdown<=15 ? 'var(--color-danger)' : 'var(--color-warning)', fontFamily:'var(--font-mono)', lineHeight:1 }}>{sessionCountdown}</div>
            <div style={{ fontSize:13, color:'var(--color-text-secondary)', marginTop:10 }}>seconds until automatic sign-out</div>
            <div style={{ fontSize:12, color:'var(--color-text-muted)', marginTop:6 }}>Your session has been idle for 30 minutes. Click <b>Stay signed in</b> to continue.</div>
          </div>
        </antd.Modal>

        {editMode && (
          <div style={{ position:'fixed', bottom:24, left:24, width:320, background:'#fff', border:'1px solid var(--color-border)', borderRadius:12, boxShadow:'var(--elevation-3)', padding:16, zIndex:200 }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12 }}>
              <div style={{ fontSize:14, fontWeight:700 }}>Tweaks</div>
              <Button size="small" type="text" onClick={() => setEditMode(false)}>✕</Button>
            </div>
            <div style={{ display:'grid', gap:14 }}>
              <div>
                <div style={{ fontSize:11, color:'var(--color-text-muted)', textTransform:'uppercase', letterSpacing:.4, fontWeight:700, marginBottom:6 }}>Role</div>
                <antd.Radio.Group value={tweaks.role} onChange={e => { updateTweak('role',e.target.value); setScreen(DEFAULT_SCREEN_BY_ROLE[e.target.value]||'dashboard'); }} buttonStyle="solid" size="small">
                  <antd.Radio.Button value="supplier">Supplier</antd.Radio.Button>
                  <antd.Radio.Button value="team-lead">Team Lead</antd.Radio.Button>
                  <antd.Radio.Button value="officer">Officer</antd.Radio.Button>
                  <antd.Radio.Button value="recommender">Recommender</antd.Radio.Button>
                  <antd.Radio.Button value="approver">Approver</antd.Radio.Button>
                </antd.Radio.Group>
              </div>
              <div>
                <div style={{ fontSize:11, color:'var(--color-text-muted)', textTransform:'uppercase', letterSpacing:.4, fontWeight:700, marginBottom:6 }}>AI Score visualisation</div>
                <antd.Radio.Group value={tweaks.aiViz} onChange={e => updateTweak('aiViz',e.target.value)} size="small">
                  <antd.Radio.Button value="gauge">Gauge</antd.Radio.Button>
                  <antd.Radio.Button value="bar">Bar</antd.Radio.Button>
                  <antd.Radio.Button value="verdict">Verdict</antd.Radio.Button>
                </antd.Radio.Group>
              </div>
              <div>
                <div style={{ fontSize:11, color:'var(--color-text-muted)', textTransform:'uppercase', letterSpacing:.4, fontWeight:700, marginBottom:6 }}>Wizard pattern</div>
                <antd.Radio.Group value={tweaks.wizardPattern} onChange={e => updateTweak('wizardPattern',e.target.value)} size="small">
                  <antd.Radio.Button value="horizontal">Horizontal</antd.Radio.Button>
                  <antd.Radio.Button value="vertical">Vertical</antd.Radio.Button>
                  <antd.Radio.Button value="pill">Pill</antd.Radio.Button>
                </antd.Radio.Group>
              </div>
              <div><antd.Checkbox checked={tweaks.denseTables} onChange={e => updateTweak('denseTables',e.target.checked)}>Compact density</antd.Checkbox></div>
            </div>
          </div>
        )}
      </Layout>
    </ConfigProvider>
  );
}

// ──── RENDER WITH RETRY ───────────────────────────────────────────────────────
let renderAttempts = 0;
function renderApp() {
  renderAttempts++;
  try {
    const root = document.getElementById('root');
    if (!root) return;
    if (typeof ReactDOM === 'undefined' || typeof App === 'undefined') {
      if (renderAttempts < 60) { setTimeout(renderApp, 100); return; }
      root.innerHTML = '<div class="error-message">Failed to load application. Please refresh.</div>';
      return;
    }
    ReactDOM.createRoot(root).render(React.createElement(App));
  } catch (err) {
    if (renderAttempts < 60) { setTimeout(renderApp, 100); return; }
    const root = document.getElementById('root');
    if (root) root.innerHTML = `<div class="error-message">Error: ${err.message}</div>`;
  }
}
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => setTimeout(renderApp, 300));
} else {
  setTimeout(renderApp, 300);
}
window.addEventListener('load', () => { if (renderAttempts === 0) renderApp(); });
</script>
</body>
</html>
