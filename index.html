<script type="text/babel">
const { Layout, Menu, Button, Avatar, Dropdown, Badge, Space, Input, ConfigProvider, Drawer } = antd;
const { Header, Sider, Content } = Layout;
const ICONS = window.icons || {};
const {
  DashboardOutlined, UnorderedListOutlined, PlusOutlined, StarOutlined, TeamOutlined,
  SafetyCertificateOutlined, DollarOutlined, FlagOutlined, EyeOutlined, FileSearchOutlined,
  BarChartOutlined, AuditOutlined, BellOutlined, MenuOutlined, SearchOutlined, UserOutlined,
  SettingOutlined, LogoutOutlined, QuestionCircleOutlined, GlobalOutlined, RobotOutlined,
  FileTextOutlined, FilePdfOutlined, FileImageOutlined, CheckCircleOutlined, ClockCircleOutlined,
  WarningOutlined, CloseCircleOutlined, InfoCircleOutlined, DownloadOutlined, UploadOutlined,
  EditOutlined, DeleteOutlined, MailOutlined, PhoneOutlined, LockOutlined, ShopOutlined,
  CreditCardOutlined, BankOutlined, QrcodeOutlined, ArrowLeftOutlined, ArrowRightOutlined,
  SendOutlined, PaperClipOutlined, ReloadOutlined, IdcardOutlined, ExclamationCircleOutlined,
  LeftOutlined, RightOutlined, PlusCircleOutlined, MoreOutlined, HistoryOutlined, KeyOutlined,
  ApartmentOutlined, ContainerOutlined, WalletOutlined, RiseOutlined,
  SwapOutlined, CrownOutlined, ZoomInOutlined, ZoomOutOutlined
} = icons;
const FormOutlined       = icons.FormOutlined       || icons.EditOutlined;
const ImportOutlined     = icons.ImportOutlined     || icons.ArrowRightOutlined;
const AlertOutlined      = icons.AlertOutlined      || icons.WarningOutlined;
const AimOutlined        = icons.AimOutlined        || icons.ThunderboltOutlined;
const BranchesOutlined   = icons.BranchesOutlined   || icons.ApartmentOutlined;
const ThunderboltOutlined= icons.ThunderboltOutlined|| icons.StarOutlined;
const SafetyOutlined     = icons.SafetyOutlined     || icons.SafetyCertificateOutlined;
Object.assign(window, { icons, AntIcons: icons });

const TWEAK_DEFAULTS = { aiViz: "bar", wizardPattern: "horizontal", role: "approver", denseTables: true };

const NAV_SUPPLIER = [
  { key: 'dashboard',       label: 'Dashboard',              icon: <DashboardOutlined /> },
  { key: 'applications',    label: 'My Applications',        icon: <UnorderedListOutlined /> },
  { key: 'sdoc-wizard',     label: 'New SDoC',               icon: <PlusCircleOutlined /> },
  { key: 'special-approval',label: 'Special Approval',       icon: <StarOutlined /> },
  { key: 'modification',    label: 'Modification Request',   icon: <FormOutlined /> },
  { key: 'importation',     label: 'Importation',            icon: <ImportOutlined /> },
  { key: 'certificates',    label: 'Certificates',           icon: <SafetyCertificateOutlined /> },
  { key: 'imei-register',   label: 'Register IMEI / SN',     icon: <QrcodeOutlined /> },
  { key: 'payments',        label: 'Payments',               icon: <WalletOutlined /> },
  { key: 'consultants',     label: 'Consultants',            icon: <ApartmentOutlined /> },
  { key: 'onboarding',      label: 'Supplier Onboarding',    icon: <IdcardOutlined /> },
  { key: 'notifications',   label: 'Notifications',          icon: <BellOutlined /> },
  { key: 'profile',         label: 'Profile & Settings',     icon: <SettingOutlined /> },
];
const NAV_TEAM_LEAD = [
  { key: 'officer-queue',     label: 'Review Queue',              icon: <FlagOutlined /> },
  { key: 'officer-review',    label: 'Active Review',             icon: <EyeOutlined /> },
  { key: 'applications',      label: 'All Applications',          icon: <FileSearchOutlined /> },
  { key: 'modification',      label: 'Modification Review',       icon: <FormOutlined /> },
  { key: 'suppliers-mgmt',    label: 'Suppliers',                 icon: <ShopOutlined /> },
  { key: 'pms',               label: 'Post-Market Surveillance',  icon: <AimOutlined /> },
  { key: 'post-monitoring',   label: 'Post Monitoring',           icon: <AlertOutlined /> },
  { key: 'compliance-status', label: 'Compliance Status',         icon: <SafetyOutlined /> },
  { key: 'sa-letter',         label: 'SA Letter',                 icon: <FileTextOutlined /> },
  { key: 'public-portal',     label: 'Public Portal',             icon: <GlobalOutlined /> },
  { key: 'integrations',      label: 'Integrations',              icon: <ApartmentOutlined /> },
  { key: 'admin-config',      label: 'Configuration',             icon: <SettingOutlined /> },
  { key: 'reports',           label: 'Reports & Analytics',       icon: <BarChartOutlined /> },
  { key: 'audit',             label: 'Audit Log',                 icon: <AuditOutlined /> },
  { key: 'profile',           label: 'Profile & Settings',        icon: <SettingOutlined /> },
];
const NAV_OFFICER = [
  { key: 'officer-queue',     label: 'My Queue',                  icon: <FlagOutlined /> },
  { key: 'officer-review',    label: 'Active Review',             icon: <EyeOutlined /> },
  { key: 'modification',      label: 'Modification Review',       icon: <FormOutlined /> },
  { key: 'suppliers-mgmt',    label: 'Suppliers',                 icon: <ShopOutlined /> },
  { key: 'pms',               label: 'Post-Market Surveillance',  icon: <AimOutlined /> },
  { key: 'post-monitoring',   label: 'Post Monitoring',           icon: <AlertOutlined /> },
  { key: 'compliance-status', label: 'Compliance Status',         icon: <SafetyOutlined /> },
  { key: 'integrations',      label: 'Integrations',              icon: <ApartmentOutlined /> },
  { key: 'profile',           label: 'Profile & Settings',        icon: <SettingOutlined /> },
];
const NAV_RECOMMENDER = [
  { key: 'officer-queue',  label: 'My Queue',           icon: <FlagOutlined /> },
  { key: 'officer-review', label: 'Active Review',      icon: <EyeOutlined /> },
  { key: 'sa-letter',      label: 'SA Letter',          icon: <FileTextOutlined /> },
  { key: 'profile',        label: 'Profile & Settings', icon: <SettingOutlined /> },
];
const NAV_VERIFIER = [
  { key: 'officer-queue',  label: 'My Queue',           icon: <FlagOutlined /> },
  { key: 'officer-review', label: 'Active Review',      icon: <EyeOutlined /> },
  { key: 'sa-letter',      label: 'SA Letter',          icon: <FileTextOutlined /> },
  { key: 'profile',        label: 'Profile & Settings', icon: <SettingOutlined /> },
];
const NAV_APPROVER = [
  { key: 'officer-queue',  label: 'Review Queue',        icon: <FlagOutlined /> },
  { key: 'officer-review', label: 'Active Review',       icon: <EyeOutlined /> },
  { key: 'sa-letter',      label: 'SA Letter',           icon: <FileTextOutlined /> },
  { key: 'reports',        label: 'Reports & Analytics', icon: <BarChartOutlined /> },
  { key: 'profile',        label: 'Profile & Settings',  icon: <SettingOutlined /> },
];
const NAV_BY_ROLE = { supplier: NAV_SUPPLIER, 'team-lead': NAV_TEAM_LEAD, officer: NAV_OFFICER, recommender: NAV_RECOMMENDER, verifier: NAV_VERIFIER, approver: NAV_APPROVER };
const DEFAULT_SCREEN_BY_ROLE = { supplier: 'dashboard', 'team-lead': 'officer-queue', officer: 'officer-queue', recommender: 'officer-queue', verifier: 'officer-queue', approver: 'officer-queue' };

const OfficerRosterPicker = ({ onSelect, onCancel }) => {
  const [search, setSearch] = React.useState('');
  const officers = MOCK_OFFICERS.filter(o => o.name.toLowerCase().includes(search.toLowerCase()));
  return (
    <antd.Modal open onCancel={onCancel} title="Assign to Officer" footer={null} width={500}>
      <Input.Search placeholder="Search officers..." onChange={e => setSearch(e.target.value)} style={{ marginBottom: 16 }} />
      <antd.List dataSource={officers} renderItem={o => (
        <antd.List.Item style={{ cursor: 'pointer' }} onClick={() => { onSelect(o); onCancel(); }}>
          <antd.List.Item.Meta avatar={<Avatar>{o.name[0]}</Avatar>} title={o.name} description={o.role} />
        </antd.List.Item>
      )} />
    </antd.Modal>
  );
};

// SCREENS object is populated by the external component files
// The component files define: SCREENS.dashboard, SCREENS.applications, etc.
const SUPPLIER_ONLY = new Set(['dashboard', 'applications', 'sdoc-wizard', 'special-approval', 'modification', 'importation', 'certificates', 'imei-register', 'payments', 'consultants', 'onboarding']);

function MinaDrawer({ open, onClose, currentUser }) {
  const [msgs, setMsgs] = React.useState([{ role: 'bot', t: 'Hi! I\'m MINA, your NCEF assistant. How can I help?' }]);
  const [input, setInput] = React.useState('');
  const [typing, setTyping] = React.useState(false);
  const endRef = React.useRef(null);

  React.useEffect(() => { if (open) endRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [msgs, open]);

  const send = (text) => {
    const q = (text || input).trim();
    if (!q) return;
    setInput('');
    setMsgs(m => [...m, { role: 'user', t: q }]);
    setTyping(true);
    setTimeout(() => {
      setTyping(false);
      const answer = minaRespond(q);
      setMsgs(m => [...m, { role: 'bot', t: answer }]);
    }, 600 + Math.random() * 400);
  };

  const quickPicks = ['What documents for Scheme B?', 'Check application status', 'How long is a certificate valid?', 'Fee breakdown'];

  return (
    <Drawer title={<Space><RobotOutlined style={{ color: 'var(--color-primary)' }} /><span>MINA · NCEF Assistant</span></Space>} placement="right" onClose={onClose} open={open} width={400} bodyStyle={{ display: 'flex', flexDirection: 'column', padding: 0, height: '100%' }}>
      <div style={{ flex: 1, overflowY: 'auto', padding: 16, display: 'flex', flexDirection: 'column', gap: 10 }}>
        {msgs.map((m, i) => (
          <div key={i} style={{ alignSelf: m.role === 'user' ? 'flex-end' : 'flex-start', maxWidth: '85%', padding: '10px 14px', borderRadius: m.role === 'user' ? '14px 14px 4px 14px' : '4px 14px 14px 14px', background: m.role === 'user' ? 'var(--color-primary)' : 'var(--color-bg-subtle)', color: m.role === 'user' ? '#fff' : 'inherit', fontSize: 13, lineHeight: 1.5 }}>{m.t}</div>
        ))}
        {typing && (
          <div style={{ alignSelf: 'flex-start', padding: '10px 16px', borderRadius: '4px 14px 14px 14px', background: 'var(--color-bg-subtle)', display: 'flex', gap: 4 }}>
            {[0,1,2].map(i => <div key={i} style={{ width: 7, height: 7, borderRadius: '50%', background: 'var(--color-text-muted)', animation: `pulse 1.2s ${i*0.2}s infinite` }} />)}
          </div>
        )}
        <div ref={endRef} />
      </div>
      <div style={{ padding: '8px 16px', borderTop: '1px solid var(--color-divider)', display: 'flex', gap: 6, flexWrap: 'wrap' }}>
        {quickPicks.map((q, i) => (
          <antd.Tag key={i} style={{ cursor: 'pointer', fontSize: 11 }} onClick={() => send(q)}>{q}</antd.Tag>
        ))}
      </div>
      <div style={{ padding: '12px 16px', borderTop: '1px solid var(--color-divider)' }}>
        <Input.Search
          value={input}
          onChange={e => setInput(e.target.value)}
          onSearch={() => send()}
          onKeyDown={e => e.key === 'Enter' && send()}
          enterButton={<SendOutlined />}
          placeholder="Ask MINA…"
          style={{ width: '100%' }}
        />
      </div>
    </Drawer>
  );
}

function App() {
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  const [editMode, setEditMode] = React.useState(false);
  const [screen, setScreen] = React.useState(() => {
    const saved = localStorage.getItem('ncef.screen');
    return saved || DEFAULT_SCREEN_BY_ROLE[TWEAK_DEFAULTS.role] || 'dashboard';
  });
  const [sidebarCollapsed, setSidebarCollapsed] = React.useState(false);
  const [minaOpen, setMinaOpen] = React.useState(false);
  const [loggedIn, setLoggedIn] = React.useState(() => sessionStorage.getItem('ncef.loggedIn') === '1');
  const [switchOpen, setSwitchOpen] = React.useState(false);
  const [sessionWarning, setSessionWarning] = React.useState(false);
  const [sessionCountdown, setSessionCountdown] = React.useState(60);
  const sessionTimerRef = React.useRef(null);
  const warningTimerRef = React.useRef(null);

  const SESSION_IDLE_MS = 30 * 60 * 1000;
  const SESSION_WARN_S  = 60;

  const resetSessionTimer = React.useCallback(() => {
    clearTimeout(sessionTimerRef.current);
    clearInterval(warningTimerRef.current);
    setSessionWarning(false);
    setSessionCountdown(SESSION_WARN_S);
    if (loggedIn) {
      sessionTimerRef.current = setTimeout(() => {
        setSessionWarning(true);
        setSessionCountdown(SESSION_WARN_S);
        let remaining = SESSION_WARN_S;
        warningTimerRef.current = setInterval(() => {
          remaining -= 1;
          setSessionCountdown(remaining);
          if (remaining <= 0) {
            clearInterval(warningTimerRef.current);
            setSessionWarning(false);
            setLoggedIn(false);
            setScreen('login');
          }
        }, 1000);
      }, SESSION_IDLE_MS);
    }
  }, [loggedIn]);

  React.useEffect(() => {
    const events = ['mousedown', 'keydown', 'touchstart', 'scroll'];
    const handlers = events.map(e => window.addEventListener(e, resetSessionTimer));
    resetSessionTimer();
    return () => events.forEach((e, i) => window.removeEventListener(e, resetSessionTimer));
  }, [resetSessionTimer]);

  const updateTweak = (key, value) => {
    const updated = { ...tweaks, [key]: value };
    setTweaks(updated);
    localStorage.setItem('ncef.tweaks', JSON.stringify(updated));
    if (key === 'role' && SUPPLIER_ONLY.has(screen)) {
      setScreen(DEFAULT_SCREEN_BY_ROLE[value] || 'dashboard');
    }
  };

  const handleSwitchProfile = (role) => {
    updateTweak('role', role);
    setSwitchOpen(false);
  };

  const isSupplier = tweaks.role === 'supplier';
  const currentNav = NAV_BY_ROLE[tweaks.role] || NAV_OFFICER;
  const currentUser = { name: 'Demo User', role: tweaks.role, avatar: 'D' };

  const ScreenComponent = SCREENS[screen];
  const Screen = ScreenComponent || (() => (
    <div style={{ padding: 24 }}>
      <div style={{ color: 'var(--color-text-secondary)' }}>
        <p>Screen not found: <strong>{screen}</strong></p>
        <p>Available screens: {Object.keys(SCREENS).slice(0, 5).join(', ')}...</p>
      </div>
    </div>
  ));

  const SwitchProfileModal = ({ open, currentRole, onClose, onSwitch }) => (
    <antd.Modal open={open} onCancel={onClose} title="Switch Profile" footer={null} width={400}>
      <div style={{ display: 'grid', gap: 12 }}>
        {['supplier', 'officer', 'team-lead', 'recommender', 'verifier', 'approver'].map(role => (
          <Button key={role} block onClick={() => onSwitch(role)} type={currentRole === role ? 'primary' : 'default'}>
            {role.charAt(0).toUpperCase() + role.slice(1).replace('-', ' ')}
          </Button>
        ))}
      </div>
    </antd.Modal>
  );

  if (!loggedIn) {
    return (
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100vh', background: 'var(--color-bg)' }}>
        <div style={{ textAlign: 'center' }}>
          <div style={{ fontSize: 32, fontWeight: 700, marginBottom: 24, color: 'var(--color-primary)' }}>NCEF Portal</div>
          <Button type="primary" size="large" onClick={() => { setLoggedIn(true); sessionStorage.setItem('ncef.loggedIn', '1'); }}>
            Sign In
          </Button>
        </div>
      </div>
    );
  }

  return (
    <ConfigProvider theme={{ token: { colorPrimary: 'var(--color-primary)' } }}>
      <Layout style={{ minHeight: '100vh' }}>
        <Sider collapsed={sidebarCollapsed} onCollapse={setSidebarCollapsed} width={240} style={{ background: 'var(--color-bg-secondary)' }}>
          <div style={{ padding: '16px 12px', textAlign: 'center', borderBottom: '1px solid var(--color-divider)', marginBottom: 16 }}>
            <div style={{ fontSize: 14, fontWeight: 700, color: 'var(--color-primary)' }}>NCEF</div>
          </div>
          <Menu selectedKeys={[screen]} onSelect={e => { setScreen(e.key); localStorage.setItem('ncef.screen', e.key); }} items={currentNav} style={{ background: 'transparent', border: 'none' }} />
        </Sider>

        <Layout>
          <Header style={{ background: 'var(--color-bg-secondary)', borderBottom: '1px solid var(--color-divider)', display: 'flex', justifyContent: 'space-between', alignItems: 'center', paddingInline: 24 }}>
            <Button type="text" icon={<MenuOutlined />} onClick={() => setSidebarCollapsed(!sidebarCollapsed)} />
            <Space>
              <Button type="text" icon={<QuestionCircleOutlined />} />
              <Button type="text" icon={<BellOutlined />} />
              <Dropdown menu={{ items: [
                { key: 'profile', label: 'Profile', icon: <UserOutlined /> },
                { key: 'switch', label: 'Switch Profile', icon: <SwapOutlined />, onClick: () => setSwitchOpen(true) },
                { key: 'settings', label: 'Settings', icon: <SettingOutlined /> },
                { key: 'edit-mode', label: editMode ? 'Exit Edit Mode' : 'Edit Mode', icon: <FormOutlined />, onClick: () => setEditMode(!editMode) },
                { type: 'divider' },
                { key: 'logout', label: 'Sign Out', icon: <LogoutOutlined />, onClick: () => { setLoggedIn(false); sessionStorage.removeItem('ncef.loggedIn'); } },
              ] }}>
                <Avatar style={{ background: 'var(--color-primary)', cursor: 'pointer' }}>{currentUser.avatar}</Avatar>
              </Dropdown>
            </Space>
          </Header>

          <Content style={{ background: 'var(--color-bg)', padding: 24, overflowY: 'auto' }}>
            <Screen nav={setScreen} tweaks={tweaks} currentUser={currentUser} />
          </Content>
        </Layout>

        {isSupplier && (
          <div className="mina-fab" onClick={() => setMinaOpen(true)}>
            <span className="pulse" />
            <RobotOutlined style={{ fontSize: 22 }} />
          </div>
        )}

        <SwitchProfileModal
          open={switchOpen}
          currentRole={tweaks.role}
          onClose={() => setSwitchOpen(false)}
          onSwitch={handleSwitchProfile}
        />

        <MinaDrawer open={minaOpen} onClose={() => setMinaOpen(false)} currentUser={currentUser} />

        <antd.Modal
          open={sessionWarning}
          closable={false}
          maskClosable={false}
          width={420}
          footer={[
            <Button key="logout" danger onClick={() => { setSessionWarning(false); setLoggedIn(false); setScreen('login'); }}>Sign out now</Button>,
            <Button key="stay" type="primary" onClick={() => resetSessionTimer()}>Stay signed in</Button>,
          ]}
          title={<Space><antd.Typography.Text type="warning"><ClockCircleOutlined /></antd.Typography.Text> Session expiring soon</Space>}
        >
          <div style={{ textAlign: 'center', padding: '16px 0' }}>
            <div style={{ fontSize: 56, fontWeight: 700, color: sessionCountdown <= 15 ? 'var(--color-danger)' : 'var(--color-warning)', fontFamily: 'var(--font-mono)', lineHeight: 1 }}>{sessionCountdown}</div>
            <div style={{ fontSize: 13, color: 'var(--color-text-secondary)', marginTop: 10 }}>seconds until automatic sign-out</div>
            <div style={{ fontSize: 12, color: 'var(--color-text-muted)', marginTop: 6 }}>Your session has been idle for 30 minutes. Click <b>Stay signed in</b> to continue, or <b>Sign out now</b> to end your session securely.</div>
          </div>
        </antd.Modal>

        {editMode && (
          <div style={{ position: 'fixed', bottom: 24, left: 24, width: 320, background: '#fff', border: '1px solid var(--color-border)', borderRadius: 12, boxShadow: 'var(--elevation-3)', padding: 16, zIndex: 200 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
              <div style={{ fontSize: 14, fontWeight: 700 }}>Tweaks</div>
              <Button size="small" type="text" onClick={() => setEditMode(false)}>✕</Button>
            </div>
            <div style={{ display: 'grid', gap: 14 }}>
              <div>
                <div style={{ fontSize: 11, color: 'var(--color-text-muted)', textTransform: 'uppercase', letterSpacing: .4, fontWeight: 700, marginBottom: 6 }}>Role</div>
                <antd.Radio.Group value={tweaks.role} onChange={e => updateTweak('role', e.target.value)} buttonStyle="solid" size="small">
                  <antd.Radio.Button value="supplier">Supplier</antd.Radio.Button>
                  <antd.Radio.Button value="team-lead">Team Lead</antd.Radio.Button>
                  <antd.Radio.Button value="officer">Officer</antd.Radio.Button>
                </antd.Radio.Group>
              </div>
              <div>
                <div style={{ fontSize: 11, color: 'var(--color-text-muted)', textTransform: 'uppercase', letterSpacing: .4, fontWeight: 700, marginBottom: 6 }}>AI Score visualisation</div>
                <antd.Radio.Group value={tweaks.aiViz} onChange={e => updateTweak('aiViz', e.target.value)} size="small">
                  <antd.Radio.Button value="gauge">Gauge</antd.Radio.Button>
                  <antd.Radio.Button value="bar">Bar</antd.Radio.Button>
                  <antd.Radio.Button value="verdict">Verdict</antd.Radio.Button>
                </antd.Radio.Group>
              </div>
              <div>
                <div style={{ fontSize: 11, color: 'var(--color-text-muted)', textTransform: 'uppercase', letterSpacing: .4, fontWeight: 700, marginBottom: 6 }}>Wizard pattern</div>
                <antd.Radio.Group value={tweaks.wizardPattern} onChange={e => updateTweak('wizardPattern', e.target.value)} size="small">
                  <antd.Radio.Button value="horizontal">Horizontal</antd.Radio.Button>
                  <antd.Radio.Button value="vertical">Vertical</antd.Radio.Button>
                  <antd.Radio.Button value="pill">Pill</antd.Radio.Button>
                </antd.Radio.Group>
              </div>
              <div>
                <antd.Checkbox checked={tweaks.denseTables} onChange={e => updateTweak('denseTables', e.target.checked)}>Compact density</antd.Checkbox>
              </div>
              <div style={{ fontSize: 11, color: 'var(--color-text-muted)', paddingTop: 8, borderTop: '1px solid var(--color-divider)' }}>
                Use the sidebar to visit Dashboard, Applications, SDoC Wizard, Special Approval, Onboarding, and (as Officer) the Review Queue + Active Review.
              </div>
            </div>
          </div>
        )}
      </Layout>
    </ConfigProvider>
  );
}

// Render with proper error handling
let renderAttempts = 0;
const maxAttempts = 50;

function renderApp() {
  renderAttempts++;
  try {
    const root = document.getElementById('root');
    
    if (!root) {
      console.error('Root element not found');
      return;
    }
    
    if (typeof ReactDOM === 'undefined') {
      console.warn(`Attempt ${renderAttempts}: ReactDOM not ready`);
      if (renderAttempts < maxAttempts) {
        setTimeout(renderApp, 100);
      } else {
        console.error('ReactDOM failed to load');
        root.innerHTML = '<div class="error-message">Failed to load ReactDOM. Please refresh the page.</div>';
      }
      return;
    }
    
    if (typeof App === 'undefined') {
      console.warn(`Attempt ${renderAttempts}: App component not ready`);
      if (renderAttempts < maxAttempts) {
        setTimeout(renderApp, 100);
      } else {
        console.error('App component failed to load');
        root.innerHTML = '<div class="error-message">Failed to load application. Please refresh the page.</div>';
      }
      return;
    }
    
    // All dependencies ready, render the app
    ReactDOM.createRoot(root).render(React.createElement(App));
    console.log(`App rendered successfully on attempt ${renderAttempts}`);
  } catch (error) {
    console.error(`Render error on attempt ${renderAttempts}:`, error.message);
    if (renderAttempts < maxAttempts) {
      setTimeout(renderApp, 100);
    } else {
      console.error('Failed to render app after 5 seconds');
      const root = document.getElementById('root');
      if (root) {
        root.innerHTML = `<div class="error-message">Error: ${error.message}</div>`;
      }
    }
  }
}

// Start rendering when page is ready
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => {
    setTimeout(renderApp, 500);
  });
} else {
  setTimeout(renderApp, 500);
}

// Also try rendering on window load event
window.addEventListener('load', () => {
  if (renderAttempts === 0) {
    console.log('Window load event triggered, attempting render');
    renderApp();
  }
});
</script>
</body>
</html>
