<style>/* NCEF Design Tokens — evolved from existing frontend/src/styles/design-tokens.css */
:root {
  --color-primary: #0B4F91;
  --color-primary-hover: #0A4783;
  --color-primary-dark: #073863;
  --color-primary-subtle: #E3F0FA;
  --color-primary-soft: #F1F7FD;
  --color-accent: #C62828;
  --color-success: #1B7F48;
  --color-success-bg: #E5F6EE;
  --color-warning: #B87200;
  --color-warning-bg: #FFF5E5;
  --color-danger: #C62828;
  --color-danger-bg: #FDEBEC;
  --color-info: #0F6ABF;
  --color-info-bg: #E6F2FC;
  --color-bg-base: #F5F8FB;
  --color-bg-subtle: #EDF2F7;
  --color-bg-elevated: #FFFFFF;
  --color-border: #D3DEE8;
  --color-border-strong: #B4C2CF;
  --color-divider: #E2E8F0;
  --color-text-primary: #1B2833;
  --color-text-secondary: #4A5B6B;
  --color-text-muted: #6B7A89;
  --color-text-inverse: #FFFFFF;
  --color-link: #0B5FCC;

  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;

  --elevation-1: 0 1px 2px rgba(10,40,80,0.06);
  --elevation-2: 0 2px 8px rgba(10,40,80,0.08);
  --elevation-3: 0 6px 20px rgba(10,40,80,0.12);

  --font-body: 'Inter', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', Menlo, Monaco, Consolas, monospace;

  --header-gradient: linear-gradient(90deg, var(--color-primary) 0%, var(--color-primary-dark) 100%);
}

html, body, #root { margin: 0; padding: 0; min-height: 100%; }
body {
  font-family: var(--font-body);
  background: var(--color-bg-base);
  color: var(--color-text-primary);
  -webkit-font-smoothing: antialiased;
}

/* Status pills */
.status-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 2px 10px; font-size: 12px; font-weight: 600;
  border-radius: 999px; letter-spacing: .2px;
  border: 1px solid transparent;
}
.status-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.status-pill.draft    { background: #EEF2F6; color: #5A6B7B; border-color: #D3DEE8; }
.status-pill.review   { background: var(--color-info-bg); color: var(--color-info); border-color: #BCDAF2; }
.status-pill.iteration{ background: var(--color-warning-bg); color: var(--color-warning); border-color: #F6D9A8; }
.status-pill.approved { background: var(--color-success-bg); color: var(--color-success); border-color: #BEE5CF; }
.status-pill.rejected { background: var(--color-danger-bg); color: var(--color-danger); border-color: #F2C4C5; }
.status-pill.expired  { background: #EEF2F6; color: #4A5B6B; border-color: #C9D3DE; }
.status-pill.priority { background: #FFF0E5; color: #B35A00; border-color: #F6CFA8; }

/* Scheme badges */
.scheme-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 2px 8px; font-size: 11px; font-weight: 700; letter-spacing: .5px;
  border-radius: 4px; text-transform: uppercase;
}
.scheme-badge.a { background: #FDEBEC; color: #B02020; }
.scheme-badge.b { background: #FFF5E5; color: #B87200; }
.scheme-badge.c { background: var(--color-success-bg); color: var(--color-success); }
.scheme-badge.sa{ background: #EDE7F6; color: #5E35B1; }

/* Scroll */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-thumb { background: var(--color-border-strong); border-radius: 4px; }
::-webkit-scrollbar-track { background: transparent; }

/* Ant overrides */
.ant-btn-primary { background: var(--color-primary) !important; }
.ant-btn-primary:hover:not(:disabled) { background: var(--color-primary-hover) !important; }
.ant-menu-inline .ant-menu-item { border-radius: 8px !important; margin: 4px 8px !important; width: calc(100% - 16px) !important; }
.ant-menu-inline .ant-menu-item-selected { background: var(--color-primary-subtle) !important; color: var(--color-primary) !important; font-weight: 600; }
.ant-table-thead > tr > th { background: var(--color-bg-subtle) !important; font-weight: 600 !important; color: var(--color-text-secondary) !important; font-size: 12px !important; letter-spacing: .3px; text-transform: uppercase; }
.ant-card { border-color: var(--color-border) !important; }
.ant-steps-item-process .ant-steps-item-icon { background: var(--color-primary) !important; border-color: var(--color-primary) !important; }
.ant-steps-item-finish .ant-steps-item-icon { border-color: var(--color-primary) !important; }
.ant-steps-item-finish .ant-steps-item-icon > .ant-steps-icon { color: var(--color-primary) !important; }

/* Compact density */
.ncef-compact .ant-btn { height: 32px; }
.ncef-compact .ant-card-body { padding: 16px; }

/* Page headers */
.page-header {
  background: var(--color-bg-elevated);
  padding: 20px 32px;
  border-bottom: 1px solid var(--color-divider);
  display: flex; align-items: center; justify-content: space-between;
}
.page-header h1 { font-size: 22px; font-weight: 600; margin: 0; color: var(--color-text-primary); }
.page-header .crumb { font-size: 12px; color: var(--color-text-muted); margin-bottom: 4px; letter-spacing: .3px; text-transform: uppercase; }

/* Subtle outline card */
.outline-card {
  background: var(--color-bg-elevated);
  border: 1px solid var(--color-border);
  border-radius: 12px;
}

/* KPI card */
.kpi-card {
  background: var(--color-bg-elevated);
  border: 1px solid var(--color-border);
  border-radius: 12px;
  padding: 18px 20px;
  transition: all .2s;
  cursor: pointer;
}
.kpi-card:hover { border-color: var(--color-primary); box-shadow: var(--elevation-2); }
.kpi-card .kpi-label { font-size: 12px; color: var(--color-text-muted); text-transform: uppercase; letter-spacing: .4px; font-weight: 600; }
.kpi-card .kpi-value { font-size: 28px; font-weight: 700; color: var(--color-text-primary); line-height: 1.2; margin-top: 6px; }
.kpi-card .kpi-delta { font-size: 12px; color: var(--color-text-secondary); margin-top: 4px; }

/* Score gauge (CSS) */
.score-gauge { position: relative; width: 120px; height: 120px; }
.score-gauge .bg { fill: none; stroke: var(--color-bg-subtle); stroke-width: 10; }
.score-gauge .fg { fill: none; stroke: var(--color-primary); stroke-width: 10; stroke-linecap: round; transition: stroke-dashoffset 1s ease; }
.score-gauge.success .fg { stroke: var(--color-success); }
.score-gauge.warning .fg { stroke: var(--color-warning); }
.score-gauge.danger  .fg { stroke: var(--color-danger); }

/* Stepper pill bar */
.wizard-pill-bar {
  display: flex; gap: 4px; padding: 4px; background: var(--color-bg-subtle);
  border-radius: 999px; width: fit-content;
}
.wizard-pill-bar .pill {
  padding: 6px 14px; font-size: 12px; font-weight: 600; color: var(--color-text-muted);
  border-radius: 999px; cursor: pointer; transition: all .15s;
}
.wizard-pill-bar .pill.active { background: var(--color-bg-elevated); color: var(--color-primary); box-shadow: var(--elevation-1); }
.wizard-pill-bar .pill.done { color: var(--color-success); }

/* Floating chatbot */
.mina-fab {
  position: fixed; bottom: 24px; right: 24px; z-index: 100;
  width: 56px; height: 56px; border-radius: 28px;
  background: var(--color-primary); color: #fff;
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--elevation-3); cursor: pointer;
  font-size: 22px; border: 3px solid #fff;
  transition: all .2s;
}
.mina-fab:hover { transform: scale(1.05); background: var(--color-primary-hover); }
.mina-fab .pulse { position: absolute; inset: -3px; border-radius: 28px; border: 2px solid var(--color-primary); animation: pulse 2s infinite; opacity: 0; }
@keyframes pulse { 0% { opacity: .6; transform: scale(1); } 100% { opacity: 0; transform: scale(1.4); } }

/* Doc tile */
.doc-tile {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px; border: 1px solid var(--color-border); border-radius: 8px;
  background: var(--color-bg-elevated);
  transition: all .15s;
}
.doc-tile:hover { border-color: var(--color-primary); background: var(--color-primary-soft); }
.doc-tile .icon { width: 36px; height: 36px; border-radius: 6px; background: var(--color-primary-subtle); color: var(--color-primary); display: flex; align-items: center; justify-content: center; }

/* Steps safety — prevent horizontal overflow on narrow viewports */
.ant-steps-horizontal { flex-wrap: wrap; row-gap: 12px; }
.ant-steps-item-title { font-size: 12px !important; white-space: nowrap; }
.ant-steps-small.ant-steps-horizontal .ant-steps-item-title { line-height: 1.3 !important; }

/* Officer split layout */
.officer-split { display: grid; grid-template-columns: 1fr 380px; gap: 0; height: calc(100vh - 140px); }
@media (max-width: 1280px) { .officer-split { grid-template-columns: 1fr; height: auto; } }
</style>

<body>
<div id="root"></div>

<script type="text/babel">
// Shared components: AI score visualisations, status pills, page shell
const { Layout, Menu, Button, Avatar, Dropdown, Badge, Tag, Space, Typography, Breadcrumb, Input, Select, Tooltip, Progress, Card, Row, Col, Statistic, Table, Steps, Form, Upload, Modal, Drawer, Alert, Radio, Checkbox, DatePicker, Divider, List, Tabs, Empty, Segmented } = antd;
const { Header, Sider, Content } = Layout;
const { Title, Text, Paragraph } = Typography;
const { TextArea } = Input;

// --- STATUS PILL ---
function StatusPill({ status }) {
  const map = {
    draft:              { cls: 'draft',     label: 'Draft' },
    under_review:       { cls: 'review',    label: 'Under Review' },
    submitted:          { cls: 'review',    label: 'Submitted' },
    iteration_required: { cls: 'iteration', label: 'Iteration Required' },
    approved:           { cls: 'approved',  label: 'Approved' },
    rejected:           { cls: 'rejected',  label: 'Rejected' },
    expired:            { cls: 'expired',   label: 'Expired' },
    priority:           { cls: 'priority',  label: 'Priority Review' },
  };
  const s = map[status] || { cls: 'draft', label: status };
  return <span className={`status-pill ${s.cls}`}><span className="dot" />{s.label}</span>;
}

function SchemeBadge({ scheme }) {
  const cls = scheme?.toLowerCase();
  const label = scheme === 'SA' ? 'Special Approval' : `Scheme ${scheme}`;
  return <span className={`scheme-badge ${cls}`}>{label}</span>;
}

// --- AI SCORE (3 variants, controlled via viz prop) ---
function AiScoreCard({ score, reasoning, viz = 'gauge', compact = false }) {
  const tone = score >= 90 ? 'success' : score >= 70 ? 'warning' : 'danger';
  const verdict = score >= 90 ? 'Auto-accept eligible' : score >= 70 ? 'Priority review' : 'Standard review';
  const toneColor = { success: 'var(--color-success)', warning: 'var(--color-warning)', danger: 'var(--color-danger)' }[tone];
  const [expanded, setExpanded] = React.useState(false);

  const Header = (
    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 12 }}>
      <div>
        <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: .5, color: 'var(--color-text-muted)', textTransform: 'uppercase' }}>AI Confidence Score</div>
        <div style={{ fontSize: 13, color: 'var(--color-text-secondary)', marginTop: 2 }}>Qwen2.5-VL · 8 criteria</div>
      </div>
      <Tag color={tone === 'success' ? 'green' : tone === 'warning' ? 'orange' : 'red'} style={{ margin: 0, fontWeight: 600 }}>{verdict}</Tag>
    </div>
  );

  const Gauge = () => {
    const r = 52, c = 2 * Math.PI * r;
    return (
      <div style={{ display: 'flex', gap: 20, alignItems: 'center' }}>
        <svg className={`score-gauge ${tone}`} viewBox="0 0 120 120" width={120} height={120}>
          <circle className="bg" cx="60" cy="60" r={r} />
          <circle className="fg" cx="60" cy="60" r={r} strokeDasharray={c} strokeDashoffset={c * (1 - score / 100)} transform="rotate(-90 60 60)" />
          <text x="60" y="58" textAnchor="middle" fontSize="28" fontWeight="700" fill="var(--color-text-primary)">{score}</text>
          <text x="60" y="76" textAnchor="middle" fontSize="11" fill="var(--color-text-muted)">/ 100</text>
        </svg>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 12, color: 'var(--color-text-muted)', textTransform: 'uppercase', letterSpacing: .3, fontWeight: 600 }}>Verdict</div>
          <div style={{ fontSize: 15, fontWeight: 600, marginTop: 4, color: toneColor }}>{verdict}</div>
          <div style={{ fontSize: 12, color: 'var(--color-text-secondary)', marginTop: 8 }}>
            {tone === 'success' && 'Exceeds 90% threshold. Officer review optional for Scheme C.'}
            {tone === 'warning' && '70–89% band. Routes to priority queue.'}
            {tone === 'danger' && 'Below 70%. Standard officer review required.'}
          </div>
        </div>
      </div>
    );
  };

  const Bar = () => (
    <div>
      <div style={{ display: 'flex', alignItems: 'baseline', gap: 8, marginBottom: 8 }}>
        <span style={{ fontSize: 36, fontWeight: 700, color: toneColor, lineHeight: 1 }}>{score}</span>
        <span style={{ fontSize: 14, color: 'var(--color-text-muted)' }}>/ 100</span>
        <span style={{ marginLeft: 'auto', fontSize: 13, fontWeight: 600, color: toneColor }}>{verdict}</span>
      </div>
      <div style={{ position: 'relative', height: 10, background: 'var(--color-bg-subtle)', borderRadius: 999 }}>
        <div style={{ position: 'absolute', inset: 0, background: `linear-gradient(90deg, var(--color-danger) 0%, var(--color-danger) 69%, var(--color-warning) 70%, var(--color-warning) 89%, var(--color-success) 90%, var(--color-success) 100%)`, opacity: .18, borderRadius: 999 }} />
        <div style={{ position: 'absolute', left: 0, top: 0, bottom: 0, width: `${score}%`, background: toneColor, borderRadius: 999, transition: 'width .8s' }} />
        <div style={{ position: 'absolute', left: '70%', top: -4, bottom: -4, width: 1, background: 'var(--color-border-strong)' }} />
        <div style={{ position: 'absolute', left: '90%', top: -4, bottom: -4, width: 1, background: 'var(--color-border-strong)' }} />
      </div>
      <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 10, color: 'var(--color-text-muted)', marginTop: 4, fontWeight: 600 }}>
        <span>0</span><span>70 priority</span><span>90 auto-accept</span><span>100</span>
      </div>
    </div>
  );

  const Verdict = () => (
    <div style={{ textAlign: 'center', padding: '12px 0' }}>
      <div style={{ display: 'inline-flex', alignItems: 'center', gap: 10, padding: '8px 16px', borderRadius: 999, background: `${toneColor}15`, border: `1px solid ${toneColor}40` }}>
        <span style={{ width: 10, height: 10, borderRadius: '50%', background: toneColor }} />
        <span style={{ fontSize: 13, fontWeight: 700, color: toneColor, letterSpacing: .3 }}>{verdict.toUpperCase()}</span>
      </div>
      <div style={{ fontSize: 56, fontWeight: 800, color: toneColor, lineHeight: 1.1, marginTop: 12, fontFeatureSettings: '"tnum"' }}>{score}<span style={{ fontSize: 20, color: 'var(--color-text-muted)', fontWeight: 500 }}> / 100</span></div>
      <div style={{ fontSize: 12, color: 'var(--color-text-muted)', marginTop: 4 }}>Generated 2 minutes ago · 8 criteria evaluated</div>
    </div>
  );

  return (
    <Card size="small" bordered style={{ borderColor: 'var(--color-border)' }}>
      {Header}
      <div style={{ marginTop: 16 }}>
        {viz === 'gauge' && <Gauge />}
        {viz === 'bar' && <Bar />}
        {viz === 'verdict' && <Verdict />}
      </div>
      {!compact && (
        <>
          <Divider style={{ margin: '16px 0 12px' }} />
          <Button type="link" size="small" style={{ padding: 0 }} onClick={() => setExpanded(!expanded)}>
            {expanded ? 'Hide' : 'Show'} reasoning ({reasoning.length} criteria)
          </Button>
          {expanded && (
            <div style={{ marginTop: 12, display: 'flex', flexDirection: 'column', gap: 10 }}>
              {reasoning.map((r, i) => (
                <div key={i} style={{ padding: 10, background: r.pass ? 'var(--color-success-bg)' : 'var(--color-warning-bg)', borderRadius: 8, borderLeft: `3px solid ${r.pass ? 'var(--color-success)' : 'var(--color-warning)'}` }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
                    <span style={{ fontSize: 12, fontWeight: 600 }}>{r.category}</span>
                    <span style={{ fontSize: 12, fontWeight: 700, color: r.pass ? 'var(--color-success)' : 'var(--color-warning)' }}>{r.score}/{r.max}</span>
                  </div>
                  <div style={{ fontSize: 11, color: 'var(--color-text-secondary)', marginTop: 4, lineHeight: 1.5 }}>{r.note}</div>
                </div>
              ))}
            </div>
          )}
        </>
      )}
    </Card>
  );
}

Object.assign(window, { StatusPill, SchemeBadge, AiScoreCard });

</script>

SCREENS.reports = function Reports() {
  const [period, setPeriod] = React.useState('month');
  const trend = MOCK.monthlyTrend;
  const totalSubmitted = trend.reduce((a, b) => a + b.submitted, 0);
  const totalApproved  = trend.reduce((a, b) => a + b.approved, 0);
  const totalAutoAccept = trend.reduce((a, b) => a + b.aiAutoAccepted, 0);
  const approvalRate = Math.round(totalApproved / totalSubmitted * 100);
  const maxSubmitted = Math.max(...trend.map(d => d.submitted));

  // Inline SVG bar chart — no external dependency needed
  const BAR_W = 48, BAR_GAP = 24, PAD = 40, HEIGHT = 160;
  const chartW = trend.length * (BAR_W + BAR_GAP) + PAD;
  const barColor = { submitted: 'var(--color-primary)', approved: 'var(--color-success)', aiAutoAccepted: 'var(--color-info)' };

  function Bars({ key, color, yOffset = 0 }) {
    return trend.map((d, i) => {
      const h = Math.round((d[key] / maxSubmitted) * HEIGHT);
      const x = PAD + i * (BAR_W + BAR_GAP);
      const y = HEIGHT - h + yOffset;
      return <rect key={i} x={x} y={y} width={BAR_W} height={h} rx={4} fill={color} opacity={0.85} />;
    });
  }

  return (
    <div style={{ padding: 32, maxWidth: 1400, margin: '0 auto' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', marginBottom: 20 }}>
        <div>
          <div style={{ fontSize: 12, color: 'var(--color-text-muted)', textTransform: 'uppercase', letterSpacing: .4, fontWeight: 600 }}>Officer · CPPG</div>
          <antd.Typography.Title level={3} style={{ margin: '4px 0 0' }}>Reports & Analytics</antd.Typography.Title>
          <antd.Typography.Text type="secondary">MCMC NCEF · Certification performance · YTD 2026</antd.Typography.Text>
        </div>
        <antd.Space>
          <antd.Segmented value={period} onChange={setPeriod} options={[{ label: 'This Month', value: 'month' }, { label: 'Last 3M', value: '3m' }, { label: 'YTD', value: 'ytd' }]} />
          <antd.Button icon={<DownloadOutlined />}>Export PDF</antd.Button>
        </antd.Space>
      </div>

      {/* KPI row */}
      <antd.Row gutter={[16, 16]} style={{ marginBottom: 24 }}>
        {[
          { l: 'Applications YTD', v: totalSubmitted, d: '+18% vs same period last year', color: 'var(--color-primary)' },
          { l: 'Approval Rate', v: `${approvalRate}%`, d: `${totalApproved} approved of ${totalSubmitted}`, color: 'var(--color-success)' },
          { l: 'AI Auto-Accepted', v: totalAutoAccept, d: `${Math.round(totalAutoAccept/totalApproved*100)}% of approvals (≥90 threshold)`, color: 'var(--color-info)' },
          { l: 'SLA Compliance', v: '95.3%', d: 'Team target: 95% · On track', color: 'var(--color-success)' },
        ].map((k, i) => (
          <antd.Col xs={12} md={6} key={i}>
            <div className="kpi-card">
              <div className="kpi-label">{k.l}</div>
              <div className="kpi-value" style={{ color: k.color }}>{k.v}</div>
              <div className="kpi-delta">{k.d}</div>
            </div>
          </antd.Col>
        ))}
      </antd.Row>

      <antd.Row gutter={[16, 16]}>
        {/* Bar chart */}
        <antd.Col xs={24} lg={16}>
          <antd.Card title="Application Volume Trend" bordered extra={
            <antd.Space size={16}>
              {[['Submitted','var(--color-primary)'],['Approved','var(--color-success)'],['AI Auto-Accept','var(--color-info)']].map(([l,c]) => (
                <antd.Space key={l} size={6}><span style={{ width: 10, height: 10, borderRadius: 2, background: c, display: 'inline-block' }} /><span style={{ fontSize: 12 }}>{l}</span></antd.Space>
              ))}
            </antd.Space>
          }>
            <svg width="100%" viewBox={`0 0 ${chartW} ${HEIGHT + 50}`} style={{ overflow: 'visible' }}>
              {/* Y axis lines */}
              {[0, 25, 50, 75, 100].map(pct => {
                const y = HEIGHT - (pct / 100) * HEIGHT;
                const val = Math.round((pct / 100) * maxSubmitted);
                return <g key={pct}>
                  <line x1={PAD} y1={y} x2={chartW} y2={y} stroke="var(--color-divider)" strokeWidth={1} />
                  <text x={PAD - 6} y={y + 4} textAnchor="end" fontSize={10} fill="var(--color-text-muted)">{val}</text>
                </g>;
              })}
              {/* Submitted bars (back) */}
              {Bars({ key: 'submitted', color: 'var(--color-primary)' })}
              {/* Approved bars (middle) */}
              {trend.map((d, i) => {
                const h = Math.round((d.approved / maxSubmitted) * HEIGHT);
                const x = PAD + i * (BAR_W + BAR_GAP) + 4;
                const y = HEIGHT - h;
                return <rect key={i} x={x} y={y} width={BAR_W - 8} height={h} rx={3} fill="var(--color-success)" opacity={0.85} />;
              })}
              {/* AI auto-accept dots */}
              {trend.map((d, i) => {
                const h = Math.round((d.aiAutoAccepted / maxSubmitted) * HEIGHT);
                const cx = PAD + i * (BAR_W + BAR_GAP) + BAR_W / 2;
                const cy = HEIGHT - h - 8;
                return <circle key={i} cx={cx} cy={cy} r={5} fill="var(--color-info)" />;
              })}
              {/* Month labels */}
              {trend.map((d, i) => (
                <text key={i} x={PAD + i * (BAR_W + BAR_GAP) + BAR_W / 2} y={HEIGHT + 20} textAnchor="middle" fontSize={12} fontWeight={600} fill="var(--color-text-secondary)">{d.month}</text>
              ))}
            </svg>
          </antd.Card>

          {/* Top applicants */}
          <antd.Card title="Top Applicants by Volume" bordered style={{ marginTop: 16 }}>
            <antd.Table
              rowKey="id"
              dataSource={MOCK.topApplicants}
              pagination={false}
              size="small"
              columns={[
                { title: 'Company', dataIndex: 'name', render: (v, r) => <div><div style={{ fontWeight: 600 }}>{v}</div><div style={{ fontSize: 11, color: 'var(--color-text-muted)' }}>{r.id}</div></div> },
                { title: 'Submitted', dataIndex: 'submissions', align: 'center', render: v => <antd.Tag>{v}</antd.Tag> },
                { title: 'Approved', dataIndex: 'approved', align: 'center', render: v => <antd.Tag color="green">{v}</antd.Tag> },
                { title: 'Approval Rate', align: 'center', render: (_, r) => {
                  const pct = Math.round(r.approved / r.submissions * 100);
                  return <antd.Progress percent={pct} size="small" strokeColor={pct >= 90 ? 'var(--color-success)' : pct >= 70 ? 'var(--color-warning)' : 'var(--color-danger)'} style={{ width: 100 }} />;
                }},
                { title: 'Avg AI Score', dataIndex: 'aiAvg', align: 'center', render: v => <antd.Tag color={v >= 90 ? 'green' : v >= 70 ? 'orange' : 'red'} style={{ fontWeight: 600 }}>{v}</antd.Tag> },
              ]}
            />
          </antd.Card>
        </antd.Col>

        {/* Right column */}
        <antd.Col xs={24} lg={8}>
          {/* AI score distribution */}
          <antd.Card title="AI Score Distribution" bordered style={{ marginBottom: 16 }}>
            {[
              { label: 'Auto-Accept (≥90)', count: totalAutoAccept, pct: Math.round(totalAutoAccept/totalApproved*100), color: 'var(--color-success)' },
              { label: 'Priority Review (70–89)', count: totalApproved - totalAutoAccept - Math.round(totalApproved*0.08), pct: Math.round((totalApproved - totalAutoAccept - Math.round(totalApproved*0.08))/totalApproved*100), color: 'var(--color-warning)' },
              { label: 'Standard Review (<70)', count: Math.round(totalApproved*0.08), pct: 8, color: 'var(--color-danger)' },
            ].map((band, i) => (
              <div key={i} style={{ marginBottom: 16 }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
                  <span style={{ fontSize: 12, fontWeight: 600, color: band.color }}>{band.label}</span>
                  <span style={{ fontSize: 12, color: 'var(--color-text-muted)' }}>{band.count} apps ({band.pct}%)</span>
                </div>
                <div style={{ height: 8, background: 'var(--color-bg-subtle)', borderRadius: 999, overflow: 'hidden' }}>
                  <div style={{ height: '100%', width: `${band.pct}%`, background: band.color, borderRadius: 999, transition: 'width .8s' }} />
                </div>
              </div>
            ))}
            <antd.Divider style={{ margin: '12px 0' }} />
            <div style={{ fontSize: 12, color: 'var(--color-text-muted)', lineHeight: 1.6 }}>
              AI confidence scoring powered by <b>Qwen2.5-VL</b>. Threshold: 70 priority, 90 auto-accept (Scheme C).
            </div>
          </antd.Card>

          {/* Officer performance */}
          <antd.Card title="Officer Performance" bordered>
            {MOCK.officerPerformance.map((o, i) => (
              <div key={i} style={{ padding: '12px 0', borderBottom: i < MOCK.officerPerformance.length - 1 ? '1px solid var(--color-divider)' : 'none' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 6 }}>
                  <div>
                    <div style={{ fontWeight: 600, fontSize: 13 }}>{o.name}</div>
                    <div style={{ fontSize: 11, color: 'var(--color-text-muted)' }}>{o.id} · {o.approved + o.rejected} decisions</div>
                  </div>
                  <antd.Tag color={o.slaCompliance >= 95 ? 'green' : o.slaCompliance >= 90 ? 'orange' : 'red'}>{o.slaCompliance}% SLA</antd.Tag>
                </div>
                <antd.Row gutter={8}>
                  {[
                    { l: 'Approved', v: o.approved, c: 'var(--color-success)' },
                    { l: 'Rejected', v: o.rejected, c: 'var(--color-danger)' },
                    { l: 'Avg hrs', v: o.avgTurnaround, c: 'var(--color-primary)' },
                    { l: 'AI overrides', v: o.aiOverrides, c: 'var(--color-warning)' },
                  ].map((s, j) => (
                    <antd.Col span={6} key={j}>
                      <div style={{ textAlign: 'center', padding: '6px 4px', background: 'var(--color-bg-subtle)', borderRadius: 6 }}>
                        <div style={{ fontSize: 15, fontWeight: 700, color: s.c }}>{s.v}</div>
                        <div style={{ fontSize: 10, color: 'var(--color-text-muted)', marginTop: 1 }}>{s.l}</div>
                      </div>
                    </antd.Col>
                  ))}
                </antd.Row>
              </div>
            ))}
          </antd.Card>
        </antd.Col>
      </antd.Row>
    </div>
  );
};

// ============ AUDIT LOG ============
SCREENS.audit = function AuditLog() {
  const [actorFilter, setActorFilter] = React.useState('all');
  const [eventFilter, setEventFilter] = React.useState([]);
  const [q, setQ] = React.useState('');
  const [expanded, setExpanded] = React.useState(null);

  const eventTypes = [...new Set(MOCK.auditLog.map(e => e.event))];
  const actorRoles = ['Officer', 'Supplier', 'System'];

  const filtered = MOCK.auditLog.filter(e => {
    if (actorFilter !== 'all' && e.actorRole !== actorFilter) return false;
    if (eventFilter.length && !eventFilter.includes(e.event)) return false;
    if (q && !(e.actor + e.event + (e.appId || '') + e.detail).toLowerCase().includes(q.toLowerCase())) return false;
    return true;
  });

  const roleColor = { Officer: 'blue', Supplier: 'cyan', System: 'purple' };
  const eventIcon = (ev) => {
    if (ev.includes('Login')) return <UserOutlined />;
    if (ev.includes('Submitted')) return <UploadOutlined />;
    if (ev.includes('Approved') || ev.includes('Issued')) return <CheckCircleOutlined />;
    if (ev.includes('Rejected')) return <CloseCircleOutlined />;
    if (ev.includes('Iteration')) return <WarningOutlined />;
    if (ev.includes('Payment')) return <CreditCardOutlined />;
    if (ev.includes('AI')) return <RobotOutlined />;
    if (ev.includes('Export')) return <DownloadOutlined />;
    return <InfoCircleOutlined />;
  };

  return (
    <div style={{ padding: 32, maxWidth: 1400, margin: '0 auto' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', marginBottom: 20 }}>
        <div>
          <div style={{ fontSize: 12, color: 'var(--color-text-muted)', textTransform: 'uppercase', letterSpacing: .4, fontWeight: 600 }}>System</div>
          <antd.Typography.Title level={3} style={{ margin: '4px 0 0' }}>Audit Log</antd.Typography.Title>
          <antd.Typography.Text type="secondary">All system events · PDPA-compliant · Retained 7 years</antd.Typography.Text>
        </div>
        <antd.Space>
          <antd.Button icon={<DownloadOutlined />}>Export CSV</antd.Button>
        </antd.Space>
      </div>

      {/* Filters */}
      <antd.Card bordered style={{ marginBottom: 16 }}>
        <antd.Row gutter={[12, 12]} align="middle">
          <antd.Col flex="auto">
            <antd.Input placeholder="Search actor, event, application ID, detail…" prefix={<SearchOutlined style={{ color: 'var(--color-text-muted)' }} />} value={q} onChange={e => setQ(e.target.value)} />
          </antd.Col>
          <antd.Col>
            <antd.Segmented
              value={actorFilter}
              onChange={setActorFilter}
              options={[{ label: 'All Actors', value: 'all' }, ...actorRoles.map(r => ({ label: r, value: r }))]}
            />
          </antd.Col>
          <antd.Col>
            <antd.Select
              mode="multiple"
              placeholder="Filter by event type"
              style={{ minWidth: 220 }}
              value={eventFilter}
              onChange={setEventFilter}
              options={eventTypes.map(t => ({ value: t, label: t }))}
              maxTagCount={2}
            />
          </antd.Col>
        </antd.Row>
      </antd.Card>

      {/* Log entries */}
      <antd.Card bordered bodyStyle={{ padding: 0 }}>
        <div style={{ padding: '10px 16px', background: 'var(--color-bg-subtle)', borderBottom: '1px solid var(--color-divider)', display: 'flex', gap: 16, fontSize: 11, fontWeight: 700, color: 'var(--color-text-muted)', textTransform: 'uppercase', letterSpacing: .4 }}>
          <span style={{ width: 160 }}>Timestamp</span>
          <span style={{ width: 36 }} />
          <span style={{ flex: 1 }}>Event / Actor</span>
          <span style={{ width: 140 }}>Application</span>
          <span style={{ width: 110 }}>IP Address</span>
        </div>
        {filtered.map((e, i) => (
          <div key={e.id} style={{ borderBottom: '1px solid var(--color-divider)' }}>
            <div
              onClick={() => setExpanded(expanded === e.id ? null : e.id)}
              style={{ padding: '12px 16px', display: 'flex', gap: 16, alignItems: 'center', cursor: 'pointer', background: expanded === e.id ? 'var(--color-primary-soft)' : 'transparent', transition: 'background .15s' }}
            >
              <span style={{ width: 160, fontSize: 12, fontFamily: 'var(--font-mono)', color: 'var(--color-text-muted)', flexShrink: 0 }}>
                {new Date(e.ts).toLocaleString('en-GB', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit', second: '2-digit' })}
              </span>
              <span style={{ width: 36, flexShrink: 0, color: 'var(--color-text-muted)', fontSize: 15 }}>{eventIcon(e.event)}</span>
              <span style={{ flex: 1 }}>
                <div style={{ fontSize: 13, fontWeight: 600 }}>{e.event}</div>
                <div style={{ fontSize: 11, color: 'var(--color-text-muted)', marginTop: 2 }}>
                  {e.actor} · <antd.Tag color={roleColor[e.actorRole]} style={{ fontSize: 10, padding: '0 5px', lineHeight: '16px' }}>{e.actorRole}</antd.Tag>
                </div>
              </span>
              <span style={{ width: 140, flexShrink: 0 }}>
                {e.appId
                  ? <antd.Typography.Text code style={{ fontSize: 11 }}>{e.appId}</antd.Typography.Text>
                  : <antd.Typography.Text type="secondary" style={{ fontSize: 11 }}>—</antd.Typography.Text>}
              </span>
              <span style={{ width: 110, fontSize: 11, fontFamily: 'var(--font-mono)', color: 'var(--color-text-muted)', flexShrink: 0 }}>{e.ip}</span>
            </div>
            {expanded === e.id && (
              <div style={{ padding: '10px 16px 14px', background: 'var(--color-primary-soft)', borderTop: '1px solid var(--color-primary)', display: 'flex', gap: 16 }}>
                <span style={{ width: 196, flexShrink: 0 }} />
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 11, color: 'var(--color-text-muted)', textTransform: 'uppercase', letterSpacing: .4, fontWeight: 700, marginBottom: 4 }}>Detail</div>
                  <div style={{ fontSize: 13, lineHeight: 1.6 }}>{e.detail}</div>
                  <div style={{ fontSize: 11, color: 'var(--color-text-muted)', marginTop: 8 }}>Audit ID <antd.Typography.Text code style={{ fontSize: 10 }}>{e.id}</antd.Typography.Text></div>
                </div>
              </div>
            )}
          </div>
        ))}
        {filtered.length === 0 && (
          <div style={{ padding: 40, textAlign: 'center' }}>
            <antd.Empty description="No audit events match the current filters." />
          </div>
        )}
        <div style={{ padding: '10px 16px', background: 'var(--color-bg-subtle)', borderTop: '1px solid var(--color-divider)', fontSize: 12, color: 'var(--color-text-muted)' }}>
          Showing {filtered.length} of {MOCK.auditLog.length} events · Click a row to expand detail
        </div>
      </antd.Card>
    </div>
  );
};

function App() {
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  const [editMode, setEditMode] = React.useState(false);
  const [screen, setScreen] = React.useState(() => {
    const saved = localStorage.getItem('ncef.screen');
    return saved || 'dashboard';
  });
  const [sidebarCollapsed, setSidebarCollapsed] = React.useState(false);
  const [minaOpen, setMinaOpen] = React.useState(false);

  React.useEffect(() => { localStorage.setItem('ncef.screen', screen); }, [screen]);

  // Tweaks listener
  React.useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setEditMode(true);
      if (e.data?.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const updateTweak = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
  };

  const isOfficer = tweaks.role === 'officer';
  const nav = isOfficer ? NAV_OFFICER : NAV_SUPPLIER;

  React.useEffect(() => {
    // reset to a role-appropriate landing when role switches
    if (isOfficer && !nav.find(n => n.key === screen)) setScreen('officer-queue');
    if (!isOfficer && !NAV_SUPPLIER.find(n => n.key === screen)) setScreen('dashboard');
  }, [tweaks.role]);

  const Screen = SCREENS[screen] || (() => <div style={{ padding: 40 }}>Screen "{screen}" not found</div>);

  return (
    <ConfigProvider theme={{
      token: {
        colorPrimary: '#0B4F91',
        colorSuccess: '#1B7F48',
        colorWarning: '#B87200',
        colorError: '#C62828',
        colorInfo: '#0F6ABF',
        fontFamily: 'Inter, -apple-system, Segoe UI, sans-serif',
        borderRadius: 8,
        colorBgLayout: '#F5F8FB',
      },
      components: { Menu: { itemHeight: 40 } },
    }}>
      <Layout style={{ minHeight: '100vh' }} className={tweaks.denseTables ? 'ncef-compact' : ''}>
        <Sider
          width={240}
          collapsedWidth={72}
          collapsed={sidebarCollapsed}
          style={{ background: '#fff', borderRight: '1px solid var(--color-divider)' }}
          theme="light"
        >
          <div style={{ padding: '18px 16px', borderBottom: '1px solid var(--color-divider)', display: 'flex', alignItems: 'center', gap: 12, minHeight: 72 }}>
            <img src="assets/mcmc-logo.png" alt="MCMC" style={{ width: 40, height: 40, objectFit: 'contain', flexShrink: 0 }} />
            {!sidebarCollapsed && (
              <div>
                <div style={{ fontWeight: 700, fontSize: 16, lineHeight: 1.1, color: 'var(--color-primary)', letterSpacing: .2 }}>NCEF</div>
                <div style={{ fontSize: 10, color: 'var(--color-text-muted)', letterSpacing: .3, marginTop: 2 }}>MCMC · Certification</div>
              </div>
            )}
          </div>
          <Menu
            selectedKeys={[screen]}
            mode="inline"
            onClick={e => setScreen(e.key)}
            items={nav}
            style={{ border: 'none', marginTop: 8 }}
          />
          <div style={{ position: 'absolute', bottom: 16, left: 16, right: 16 }}>
            {!sidebarCollapsed && (
              <div style={{ padding: 12, background: 'var(--color-primary-soft)', borderRadius: 10, fontSize: 11 }}>
                <div style={{ fontWeight: 700, color: 'var(--color-primary)', marginBottom: 4, display: 'flex', alignItems: 'center', gap: 6 }}><RobotOutlined /> MINA assistant</div>
                <div style={{ color: 'var(--color-text-secondary)', lineHeight: 1.5 }}>Ask about schemes, documents, or application status.</div>
                <Button type="link" size="small" style={{ padding: 0, marginTop: 4 }} onClick={() => setMinaOpen(true)}>Open chat →</Button>
              </div>
            )}
          </div>
        </Sider>

        <Layout>
          <Header style={{ background: '#fff', borderBottom: '1px solid var(--color-divider)', padding: '0 24px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', height: 56, lineHeight: 'normal' }}>
            <Space size="middle">
              <Button type="text" icon={<MenuOutlined />} onClick={() => setSidebarCollapsed(!sidebarCollapsed)} />
              <Input placeholder="Search applications, certificates, IMEIs…" prefix={<SearchOutlined style={{ color: 'var(--color-text-muted)' }} />} style={{ width: 360 }} />
            </Space>
            <Space size="middle">
              <Badge count={3} size="small"><Button type="text" icon={<BellOutlined style={{ fontSize: 18 }} />} /></Badge>
              <Dropdown menu={{ items: [{ key: 'en', label: 'English' }, { key: 'bm', label: 'Bahasa Melayu' }] }}>
                <Button type="text" icon={<GlobalOutlined />}>EN</Button>
              </Dropdown>
              <Dropdown menu={{ items: [
                { key: 'profile', icon: <UserOutlined />, label: 'Profile & Settings', onClick: () => setScreen('profile') },
                { key: 'help', icon: <QuestionCircleOutlined />, label: 'Help Centre' },
                { type: 'divider' },
                { key: 'logout', icon: <LogoutOutlined />, label: 'Sign out', danger: true },
              ] }}>
                <Space style={{ cursor: 'pointer' }}>
                  <Avatar style={{ background: isOfficer ? 'var(--color-accent)' : 'var(--color-primary)' }}>{isOfficer ? 'F' : 'N'}</Avatar>
                  <div style={{ textAlign: 'left', display: window.innerWidth > 640 ? 'block' : 'none' }}>
                    <div style={{ fontSize: 13, fontWeight: 600, lineHeight: 1.2 }}>{isOfficer ? 'En. Faisal Rahman' : 'Nurul Aisyah'}</div>
                    <div style={{ fontSize: 11, color: 'var(--color-text-muted)' }}>{isOfficer ? 'CPPG Officer' : 'Supplier · SUP-0426-00142'}</div>
                  </div>
                </Space>
              </Dropdown>
            </Space>
          </Header>

          <Content style={{ overflow: 'auto' }}>
            <Screen nav={setScreen} tweaks={tweaks} />
          </Content>
        </Layout>

        {!isOfficer && (
          <div className="mina-fab" onClick={() => setMinaOpen(true)}>
            <span className="pulse" />
            <RobotOutlined style={{ fontSize: 22 }} />
          </div>
        )}

        {/* MINA assistant drawer */}
        <Drawer title={<Space><RobotOutlined style={{ color: 'var(--color-primary)' }} /><span>MINA · NCEF Assistant</span></Space>} placement="right" onClose={() => setMinaOpen(false)} open={minaOpen} width={400}>
          <div style={{ display: 'flex', flexDirection: 'column', height: '100%' }}>
            <div style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: 12 }}>
              {[
                { role: 'bot', t: 'Hi Nurul! I can help with schemes, document requirements, and your open applications.' },
                { role: 'user', t: 'Why was my Apple Watch application flagged for iteration?' },
                { role: 'bot', t: 'APP-0426-00083 scored 62. The officer noted: missing frequency band for Wi-Fi 6E secondary range, and two clauses in MCMC MTSFB TC G015:2022 marked N/A without justification. You have until 4 Jun to resubmit.' },
                { role: 'user', t: 'Can AI auto-accept my Xiaomi submission?' },
                { role: 'bot', t: 'Your Mi Band 9 Pro scored 94, which exceeds the 90 threshold for Scheme C auto-accept. It was approved without officer review.' },
              ].map((m, i) => (
                <div key={i} style={{ alignSelf: m.role === 'user' ? 'flex-end' : 'flex-start', maxWidth: '85%', padding: '10px 14px', borderRadius: 12, background: m.role === 'user' ? 'var(--color-primary)' : 'var(--color-bg-subtle)', color: m.role === 'user' ? '#fff' : 'inherit', fontSize: 13, lineHeight: 1.5 }}>{m.t}</div>
              ))}
            </div>
            <div style={{ marginTop: 16 }}>
              <Input.Search enterButton="Send" placeholder="Ask MINA…" />
              <div style={{ display: 'flex', gap: 6, marginTop: 8, flexWrap: 'wrap' }}>
                {['What documents do I need for Scheme B?', 'Check application status', 'How long is a certificate valid?'].map((q, i) => (
                  <antd.Tag key={i} style={{ cursor: 'pointer' }}>{q}</antd.Tag>
                ))}
              </div>
            </div>
          </div>
        </Drawer>

        {/* Tweaks panel */}
        {editMode && (
          <div style={{ position: 'fixed', bottom: 24, left: 24, width: 320, background: '#fff', border: '1px solid var(--color-border)', borderRadius: 12, boxShadow: 'var(--elevation-3)', padding: 16, zIndex: 200 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
              <div style={{ fontSize: 14, fontWeight: 700 }}>Tweaks</div>
              <Button size="small" type="text" onClick={() => setEditMode(false)}>✕</Button>
            </div>
            <div style={{ display: 'grid', gap: 14 }}>
              <div>
                <div style={{ fontSize: 11, color: 'var(--color-text-muted)', textTransform: 'uppercase', letterSpacing: .4, fontWeight: 700, marginBottom: 6 }}>Role</div>
                <antd.Radio.Group value={tweaks.role} onChange={e => updateTweak('role', e.target.value)} buttonStyle="solid" size="small">
                  <antd.Radio.Button value="supplier">Supplier</antd.Radio.Button>
                  <antd.Radio.Button value="officer">Officer</antd.Radio.Button>
                </antd.Radio.Group>
              </div>
              <div>
                <div style={{ fontSize: 11, color: 'var(--color-text-muted)', textTransform: 'uppercase', letterSpacing: .4, fontWeight: 700, marginBottom: 6 }}>AI Score visualisation</div>
                <antd.Radio.Group value={tweaks.aiViz} onChange={e => updateTweak('aiViz', e.target.value)} size="small">
                  <antd.Radio.Button value="gauge">Gauge</antd.Radio.Button>
                  <antd.Radio.Button value="bar">Bar</antd.Radio.Button>
                  <antd.Radio.Button value="verdict">Verdict</antd.Radio.Button>
                </antd.Radio.Group>
              </div>
              <div>
                <div style={{ fontSize: 11, color: 'var(--color-text-muted)', textTransform: 'uppercase', letterSpacing: .4, fontWeight: 700, marginBottom: 6 }}>Wizard pattern</div>
                <antd.Radio.Group value={tweaks.wizardPattern} onChange={e => updateTweak('wizardPattern', e.target.value)} size="small">
                  <antd.Radio.Button value="horizontal">Horizontal</antd.Radio.Button>
                  <antd.Radio.Button value="vertical">Vertical</antd.Radio.Button>
                  <antd.Radio.Button value="pill">Pill</antd.Radio.Button>
                </antd.Radio.Group>
              </div>
              <div>
                <antd.Checkbox checked={tweaks.denseTables} onChange={e => updateTweak('denseTables', e.target.checked)}>Compact density</antd.Checkbox>
              </div>
              <div style={{ fontSize: 11, color: 'var(--color-text-muted)', paddingTop: 8, borderTop: '1px solid var(--color-divider)' }}>
                Use the sidebar to visit Dashboard, Applications, SDoC Wizard, Special Approval, Onboarding, and (as Officer) the Review Queue + Active Review.
              </div>
            </div>
          </div>
        )}
      </Layout>
    </ConfigProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
